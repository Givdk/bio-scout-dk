<!DOCTYPE html>
<html class="dark" lang="da">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | NatureTrails Edition</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#111417",
              "surface": "#1d2024",
              "primary-container": "#00e5ff",
              "on-surface": "#e1e2e8",
              "primary": "#c3f5ff",
            },
            borderRadius: {"DEFAULT": "0px", "full": "9999px"},
          },
        },
      }
    </script>

    <style>
        .glass-panel {
            background: rgba(50, 53, 57, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(195, 245, 255, 0.1);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #9cf0ff 0%, #00e5ff 100%);
        }
        .scanner-line {
            height: 2px;
            background: #00e5ff;
            position: absolute;
            width: 100%;
            animation: scan 2s linear infinite;
            box-shadow: 0 0 20px #00e5ff;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        body { min-height: 100dvh; overflow-x: hidden; }
    </style>
</head>

<body class="bg-background text-on-surface font-body">

<header class="fixed top-0 w-full z-50 bg-[#111417]/60 backdrop-blur-xl border-b border-white/5 flex justify-between items-center px-6 h-16">
    <div class="flex items-center gap-4">
        <span class="material-symbols-outlined text-[#00e5ff]">menu_open</span>
        <h1 class="font-black uppercase tracking-widest text-[1.2rem] text-[#c3f5ff]">NATURETRAILS</h1>
    </div>
    <div id="xp-badge" class="px-3 py-1 bg-surface border border-primary/20 text-[10px] font-black text-primary">
        LVL 01 SCOUT
    </div>
</
