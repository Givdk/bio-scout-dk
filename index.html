<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Scout DK | AI Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1A1D21; color: #F0F0F0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-blue { color: #00E5FF; }
        .bg-neon { background-color: #00E5FF; }
        .neon-glow { box-shadow: 0 0 25px rgba(0, 229, 255, 0.5); }
        @keyframes scan-line { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner-line { height: 2px; background: #00E5FF; position: absolute; width: 100%; animation: scan-line 2s linear infinite; box-shadow: 0 0 15px #00E5FF; z-index: 10; }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="flex justify-between items-center mb-8 pt-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase leading-none text-center">Bio-Scout <span class="neon-blue font-black">AI</span></h1>
            <p class="text-[10px] tracking-[0.3em] text-gray-500 uppercase font-bold mt-1 text-center">Dansk Natur Intelligence</p>
        </div>
        <div class="w-12 h-12 rounded-full border border-gray-700 flex items-center justify-center bg-gray-800 shadow-xl">👤</div>
    </header>

    <section class="mb-6">
        <div class="glass p-5 rounded-3xl border-l-4 border-[#00E5FF]">
            <p class="text-[10px] uppercase tracking-widest text-[#00E5FF] font-bold mb-1">System Status</p>
            <p class="text-white text-sm font-medium" id="status-text">Klar til scanning...</p>
        </div>
    </section>

    <section id="result-box" class="hidden mb-8">
        <h2 class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mb-3 font-black">Analyse Resultat</h2>
        <div class="glass p-6 rounded-3xl border border-[#00E5FF]/30 bg-[#00E5FF]/5">
            <p id="ai-response" class="text-lg font-bold text-white mb-2 leading-tight font-['Inter']">Analyserer...</p>
            <p id="ai-details" class="text-sm text-gray-400 italic font-light leading-relaxed"></p>
        </div>
    </section>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass rounded-[40px] py-4 px-10 flex justify-between items-center z-50 border border-white/10 shadow-2xl">
        <button class="text-gray-500">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
        </button>
        
        <button id="camera-btn" class="bg-neon p-5 rounded-3xl neon-glow -mt-16 transform active:scale-90 transition-all border-[6px] border-[#1A1D21]">
            <svg width="32" height="32" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </button>

        <button class="text-gray-500">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </button>
    </nav>

    <div id="scanner" class="hidden fixed inset-0 bg-black z-[100] flex flex-col overflow-hidden">
        <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
        <div class="scanner-line"></div>
        <button id="close-btn" class="absolute top-10 right-6 text-white text-5xl font-light">&times;</button>
        <div class="absolute bottom-12 w-full flex justify-center">
            <button id="capture-btn" class="w-20 h-20 rounded-full border-4 border-white bg-white/10 backdrop-blur-md shadow-2xl active:scale-95 transition-all"></button>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
    </div>

    <script>
        const API_KEY = "AIzaSyBEkiYyE2J5nAt1ZkZe0BJPLnqzcFVhLd8";
        
        const cameraBtn = document.getElementById('camera-btn');
        const scanner = document.getElementById('scanner');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const closeBtn = document.getElementById('close-btn');
        const resultBox = document.getElementById('result-box');
        const aiResponse = document.getElementById('ai-response');
        const aiDetails = document.getElementById('ai-details');
        const statusText = document.getElementById('status-text');

        cameraBtn.onclick = async () => {
            scanner.classList.remove('hidden');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Giv adgang til kameraet for at scanne.");
            }
        };

        closeBtn.onclick = () => {
            if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            scanner.classList.add('hidden');
        };

        captureBtn.onclick = async () => {
            statusText.innerText = "📸 Stiller skarpt...";
            captureBtn.disabled = true;

            // Vent kort på fokus
            await new Promise(resolve => setTimeout(resolve, 500));

            // HD Opløsning til AI'en
            const width = 1280;
            const height = (video.videoHeight / video.videoWidth) * width;
            canvas.width = width;
            canvas.height = height;
            
            canvas.getContext('2d').drawImage(video, 0, 0, width, height);
            const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            closeBtn.click();
            resultBox.classList.remove('hidden');
            aiResponse.innerText = "🤖 AI Analyserer...";
            aiDetails.innerText = "Vent et øjeblik mens vi identificerer arten...";
            statusText.innerText = "Kontakter biolog-database...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Du er en dansk biolog-ekspert. Identificer planten eller dyret på dette billede. Svar på dansk. Start med navnet i fed skrift. Derefter én kort beskrivelse (maks 20 ord) om hvor den findes i Danmark. Hvis du er i tvivl, så giv dit bedste gæt." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });

                if (!response.ok) throw new Error("API-fejl.");

                const data = await response.json();
                if (data.candidates && data.candidates[0]) {
                    const resultText = data.candidates[0].content.parts[0].text;
                    const lines = resultText.split('\n');
                    
                    aiResponse.innerHTML = `<span class="text-[#00E5FF] font-black">${lines[0].replace(/\*/g, '')}</span>`;
                    aiDetails.innerText = lines.slice(1).join(' ') || "Art registreret i dansk natur.";
                    statusText.innerText = "Scanning gennemført!";
                } else {
                    throw new Error("AI kunne ikke se motivet tydeligt.");
                }

            } catch (err) {
                aiResponse.innerText = "⚠️ Scanning fejlede";
                aiDetails.innerText = "Prøv at gå tættere på motivet og sørg for masser af lys.";
                statusText.innerText = "Klar til nyt forsøg.";
            } finally {
                captureBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
