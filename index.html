<!DOCTYPE html>
<html class="dark" lang="en">

<body class="p-0 m-0">

<header class="fixed top-0 w-full z-[50] bg-[#111417] px-6 h-16 flex justify-between items-center border-b border-white/5">
    <h1 class="font-black uppercase tracking-tighter text-xl text-[#00e5ff]">Bio-Scout</h1>
    <div id="xp-display" class="font-bold text-xs">0 XP</div>
</header>

        <h2 class="text-3xl font-black italic">READY</h2>
    </section>

    <div id="result-box" class="hidden glass-panel p-6 border-l-4 border-[#00e5ff] mb-6">
        <h3 id="ai-response" class="text-2xl font-black uppercase">...</h3>
        <p id="ai-details" class="text-sm opacity-70 mt-2 italic"></p>
    </div>

    <div id="collection-list" class="space-y-3"></div>
</main>

    <span class="material-symbols-outlined font-black text-5xl text-[#111417]">photo_camera</span>
</button>
