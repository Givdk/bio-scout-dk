<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | Mission Control</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#111417",
              "surface": "#111417",
              "primary-cyan": "#00e5ff",
              "surface-container-high": "#272a2e",
              "surface-container-lowest": "#0b0e12",
              "on-surface": "#e1e2e8",
            },
            fontFamily: { "body": ["Inter"] },
            borderRadius: { "DEFAULT": "0px", "full": "9999px" },
          },
        },
      }
    </script>
    <style>
        .glass-panel { background: rgba(50, 53, 57, 0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .primary-gradient { background: linear-gradient(135deg, #9cf0ff 0%, #00e5ff 100%); }
        .scanner-line { height: 2px; background: #00e5ff; position: absolute; width: 100%; animation: scan 2s linear infinite; box-shadow: 0 0 20px #00e5ff; z-index: 100; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        @keyframes missionPulse { 0% { box-shadow: 0 0 5px #00e5ff; } 50% { box-shadow: 0 0 25px #00e5ff; } 100% { box-shadow: 0 0 5px #00e5ff; } }
        .mission-success { border: 2px solid #00e5ff; animation: missionPulse 1.5s infinite; }
        .entry-animate { animation: fadeSlideIn 0.35s ease both; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen overflow-x-hidden pb-40">

    <header class="fixed top-0 left-0 right-0 z-[60] bg-[#111417]/80 backdrop-blur-xl flex justify-between items-center px-6 py-4 border-b border-white/5">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary-cyan">biotech</span>
            <h1 class="uppercase tracking-[0.1em] text-sm font-bold text-[#c3f5ff]">BIO-SCOUT PRO</h1>
        </div>
        <div class="px-3 py-1 border border-primary-cyan/20 text-[10px] font-black uppercase text-primary-cyan">Lv. 01 Scout</div>
    </header>

    <main class="pt-24 px-6 max-w-lg mx-auto space-y-10">
        <section class="glass-panel p-6 border-l-2 border-primary-cyan">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-[10px] font-bold text-primary-cyan uppercase tracking-widest mb-1 italic">Bio-Points</p>
                    <h2 id="xp-display" class="text-5xl font-black italic tracking-tighter leading-none">0</h2>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Rank</p>
                    <h2 class="text-xl font-black text-white">#142</h2>
                </div>
            </div>
            <div class="w-full h-1 bg-white/5 overflow-hidden">
                <div id="xp-bar" class="h-full bg-primary-cyan transition-all duration-1000" style="width: 5%"></div>
            </div>
        </section>

        <section class="space-y-4">
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 italic px-1">Active Objective</h3>
            <div id="active-mission-card" class="glass-panel p-5 border-t-2 border-primary-cyan">
                <div class="flex justify-between items-start mb-2">
                    <h4 class="text-lg font-black uppercase tracking-tight leading-none">NT-718: Botanical</h4>
                    <span class="text-[9px] font-bold text-primary-cyan tracking-widest">SPRING 2026</span>
                </div>
                <p class="text-xs text-on-surface/60 mb-4">Identify a blooming Anemone flower.</p>
                <!-- FIX: mission progress now restored from localStorage on load -->
                <div class="h-1 bg-white/5 w-full"><div id="mission-progress" class="h-full bg-primary-cyan transition-all duration-500" style="width: 0%"></div></div>
            </div>
        </section>

        <section id="result-box" class="hidden">
            <div id="result-panel" class="glass-panel p-6 border-l-4 border-primary-cyan bg-primary-cyan/5 relative">
                <p id="analysis-label" class="text-[9px] font-black text-primary-cyan uppercase tracking-[0.2em] mb-2">Analysis</p>
                <h3 id="ai-response" class="text-3xl font-black uppercase tracking-tight italic leading-none">Scanning...</h3>
                <p id="ai-details" class="text-sm opacity-70 mt-3 italic leading-relaxed"></p>
            </div>
        </section>

        <div class="space-y-4">
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 italic px-1">Field Logbook</h3>
            <div id="collection-list" class="space-y-2"></div>
        </div>
    </main>

    <button id="camera-btn" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] w-20 h-20 primary-gradient flex items-center justify-center shadow-[0_0_50px_rgba(0,229,255,0.4)] active:scale-90 border-8 border-[#111417]">
        <span class="material-symbols-outlined font-black text-4xl text-[#111417]">photo_camera</span>
    </button>

    <div id="scanner" class="hidden fixed inset-0 bg-black z-[1000] flex flex-col overflow-hidden">
        <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
        <div class="scanner-line"></div>
        <div class="absolute inset-0 p-8 flex flex-col justify-between pointer-events-none">
            <div class="flex justify-between items-start pointer-events-auto">
                <div class="glass-panel px-4 py-2 border-l-2 border-primary-cyan"><p class="text-[10px] font-black uppercase text-primary-cyan">Mission Scanner Active</p></div>
                <button id="close-btn" class="text-white text-5xl">✕</button>
            </div>
            <div class="flex justify-center mb-10 pointer-events-auto">
                <button id="capture-btn" class="w-24 h-24 border-8 border-white rounded-full bg-white/20 backdrop-blur-xl shadow-2xl"></button>
            </div>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
    </div>

<script>
    const API_KEY = "AIzaSyBu-a5-TorUQFvA41l5t_aV9cU3yhw7veI";
    const MISSION_ID = "NT-718: Botanical (Anemone)";

    const cameraBtn      = document.getElementById('camera-btn');
    const scanner        = document.getElementById('scanner');
    const video          = document.getElementById('video');
    const canvas         = document.getElementById('canvas');
    const captureBtn     = document.getElementById('capture-btn');
    const closeBtn       = document.getElementById('close-btn');
    const resultBox      = document.getElementById('result-box');
    const resultPanel    = document.getElementById('result-panel');
    const aiResponse     = document.getElementById('ai-response');
    const aiDetails      = document.getElementById('ai-details');
    const xpDisplay      = document.getElementById('xp-display');
    const xpBar          = document.getElementById('xp-bar');
    const missionProgress = document.getElementById('mission-progress');
    const collectionList = document.getElementById('collection-list');

    let xp = parseInt(localStorage.getItem('scoutXP')) || 0;

    function updateUI() {
        const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
        xpDisplay.innerText = xp;
        xpBar.style.width = Math.min((xp % 1000) / 10, 100) + "%";

        // FIX: restore mission progress from localStorage
        const missionDone = localStorage.getItem('missionNT718') === 'complete';
        missionProgress.style.width = missionDone ? "100%" : "20%";

        // FIX: show empty state message when logbook is empty
        collectionList.innerHTML = "";
        if (finds.length === 0) {
            collectionList.innerHTML = `<p class="text-[11px] text-gray-600 uppercase tracking-widest italic px-1">No species logged yet.</p>`;
            return;
        }

        finds.slice().reverse().forEach(f => {
            const item = document.createElement('div');
            item.className = "glass-panel p-4 flex justify-between items-center border-l-2 border-primary-cyan mb-2 entry-animate";
            item.innerHTML = `
                <div>
                    <p class="text-[9px] font-bold text-primary-cyan uppercase">${f.date}</p>
                    <p class="text-lg font-black uppercase text-white tracking-tighter leading-none mt-1">${f.name}</p>
                </div>
                <span class="material-symbols-outlined text-primary-cyan">verified</span>`;
            collectionList.appendChild(item);
        });
    }

    function stopStream() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
            video.srcObject = null;
        }
    }

    cameraBtn.onclick = async () => {
        scanner.classList.remove('hidden');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (e) {
            alert("Camera Access Denied.");
            scanner.classList.add('hidden');
        }
    };

    closeBtn.onclick = () => { stopStream(); scanner.classList.add('hidden'); };

    captureBtn.onclick = async () => {
        // FIX: guard both width AND height before capturing
        if (!video.videoWidth || !video.videoHeight) {
            alert("Camera isn't ready yet — please wait a moment.");
            return;
        }

        captureBtn.disabled = true;
        const scale = 720 / video.videoWidth;
        canvas.width  = 720;
        canvas.height = Math.round(video.videoHeight * scale);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL("image/jpeg", 0.6).split(',')[1];

        stopStream();
        scanner.classList.add('hidden');
        resultBox.classList.remove('hidden');
        resultPanel.classList.remove('mission-success');
        aiResponse.innerText = "LINKING...";
        aiDetails.innerText  = "Analyzing species against Mission objective...";

        try {
            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`,
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: `Identify species. Then, determine if it matches Objective: ${MISSION_ID}. Format: Line 1: NAME (ALL CAPS). Line 2: YES or NO (if it matches objective). Line 3: 1 short sentence in English.` },
                                { inline_data: { mime_type: "image/jpeg", data: base64 } }
                            ]
                        }]
                    })
                }
            );

            const data = await res.json();

            // FIX: surface API errors with code + message instead of just "ERROR"
            if (data.error) {
                aiResponse.innerText = "API ERROR " + data.error.code;
                aiDetails.innerText  = data.error.message;
                return;
            }

            const text   = data?.candidates?.[0]?.content?.parts?.[0]?.text || "UNKNOWN";
            const lines  = text.split("\n").filter(l => l.trim());
            const name   = (lines[0] || "UNKNOWN").replace(/[*#]/g, '').trim().toUpperCase();
            const isMatch = (lines[1] || "").toUpperCase().includes("YES");
            const detail = (lines.slice(2).join(" ") || "Data verified.").replace(/[*#]/g, '').trim();

            // FIX: only process valid results
            const isValid = name.length > 2 && name !== "UNKNOWN";

            if (isMatch) {
                aiResponse.innerText = "MISSION ACCOMPLISHED";
                aiDetails.innerText  = `Objective Met: ${name}. ${detail}`;
                resultPanel.classList.add('mission-success');
                missionProgress.style.width = "100%";
                // FIX: persist mission completion across reloads
                localStorage.setItem('missionNT718', 'complete');
                if (isValid) xp += 500;
            } else {
                aiResponse.innerText = name;
                aiDetails.innerText  = detail;
                if (isValid) xp += 100;
            }

            if (isValid) {
                localStorage.setItem('scoutXP', xp);
                const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];

                // FIX: duplicate guard — don't log same species twice on same day
                const today = new Date().toLocaleDateString('en-US');
                const alreadyLogged = finds.some(f => f.name === name && f.date === today);
                if (!alreadyLogged) {
                    finds.push({ name, date: today });
                    localStorage.setItem('scoutFinds', JSON.stringify(finds));
                }

                updateUI();
            }

        } catch (e) {
            aiResponse.innerText = "NETWORK ERROR";
            aiDetails.innerText  = "Connection failed. Please try again.";
        } finally {
            captureBtn.disabled = false;
        }
    };

    updateUI();
</script>
</body>
</html>
