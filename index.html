<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Scout DK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1A1D21; color: #F0F0F0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-blue { color: #00E5FF; }
        .bg-neon { background-color: #00E5FF; }
        .neon-glow { box-shadow: 0 0 20px rgba(0, 229, 255, 0.4); }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="flex justify-between items-center mb-8 pt-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter neon-blue uppercase text-white">Bio-Scout <span class="neon-blue">DK</span></h1>
            <p class="text-[10px] tracking-[0.3em] text-gray-500 uppercase font-bold">Citizen Science Task Force</p>
        </div>
        <div class="w-12 h-12 rounded-full border border-gray-700 flex items-center justify-center bg-gray-800 text-xl shadow-inner">👤</div>
    </header>

    <section class="mb-8">
        <h2 class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-black">Aktuel Mission</h2>
        <div class="glass p-5 rounded-3xl border-l-4 border-[#00E5FF] relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex justify-between items-start mb-2">
                    <p class="font-bold text-lg text-white">Forårets Budbringer</p>
                    <span class="text-[10px] bg-[#00E5FF]/20 text-[#00E5FF] px-2 py-1 rounded font-bold">500 XP</span>
                </div>
                <p class="text-sm text-gray-400 leading-snug">Find og scan en **Citronsommerfugl** i den danske natur.</p>
                <div class="w-full bg-gray-900 h-1.5 mt-4 rounded-full">
                    <div class="bg-neon h-full neon-glow rounded-full" style="width: 35%"></div>
                </div>
            </div>
        </div>
    </section>

    <section>
        <h2 class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-black">Seneste Fund</h2>
        <div class="glass rounded-3xl overflow-hidden border border-white/5">
            <img src="https://images.unsplash.com/photo-1550686041-366ad85a1355?auto=format&fit=crop&w=800&q=80" class="w-full h-40 object-cover opacity-50">
            <div class="p-4">
                <p class="text-[10px] neon-blue font-bold tracking-widest uppercase">Bøgeskov • Tisvilde Hegn</p>
                <p class="text-sm font-medium">Observation registreret for 5m siden</p>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass rounded-[40px] py-4 px-10 flex justify-between items-center z-50 border border-white/10 shadow-2xl">
        <button class="text-gray-500">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
        </button>
        
        <button id="camera-btn" class="bg-neon p-5 rounded-3xl neon-glow -mt-16 transform active:scale-90 transition-all border-[6px] border-[#1A1D21]">
            <svg width="32" height="32" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </button>

        <button class="text-gray-500">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 6l7-4 8 4 7-4v16l-7 4-8-4-7 4V6z"></path></svg>
        </button>
    </nav>

    <div id="scanner" class="hidden fixed inset-0 bg-black z-[100] flex flex-col">
        <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
        <div class="absolute inset-0 border-[2px] border-[#00E5FF]/40 m-10 pointer-events-none rounded-3xl"></div>
        <button id="close-btn" class="absolute top-10 right-6 text-white text-4xl">&times;</button>
        <div class="absolute bottom-12 w-full flex justify-center">
            <button id="capture-btn" class="w-20 h-20 rounded-full border-4 border-white bg-white/20 backdrop-blur-sm shadow-2xl active:scale-95 transition-transform"></button>
        </div>
    </div>

    <script>
        const cameraBtn = document.getElementById('camera-btn');
        const scanner = document.getElementById('scanner');
        const video = document.getElementById('video');
        const closeBtn = document.getElementById('close-btn');
        const captureBtn = document.getElementById('capture-btn');

        // Start Scanner
        cameraBtn.onclick = async () => {
            scanner.classList.remove('hidden');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
            } catch (err) {
                alert("Kamera adgang nægtet: " + err.message);
            }
        };

        // Stop Scanner
        closeBtn.onclick = () => {
            const stream = video.srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());
            scanner.classList.add('hidden');
        };

        // Tag Billede (Simulering)
        captureBtn.onclick = () => {
            captureBtn.classList.add('bg-neon');
            setTimeout(() => {
                alert("BIO-SCAN: Citronsommerfugl identificeret! +500 XP");
                captureBtn.classList.remove('bg-neon');
                closeBtn.click();
            }, 1000);
        };
    </script>
</body>
</html>
