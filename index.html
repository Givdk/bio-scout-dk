<!DOCTYPE html>
<html class="dark" lang="da">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | Tactical HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "background": "#111417", // The Void
              "surface-low": "#0b0e12",
              "surface-high": "#272a2e",
              "primary-cyan": "#00e5ff", // Neon Ice
              "on-surface": "#e1e2e8",
            },
            fontFamily: { "sans": ["Inter"] },
            borderRadius: { "none": "0px" },
          },
        },
      }
    </script>

    <style>
        /* Stitch AI Core Styles */
        body { background-color: #111417; letter-spacing: -0.01em; }
        h1, h2, h3, h4 { letter-spacing: -0.02em; text-transform: uppercase; font-style: italic; }
        
        .glass-panel { 
            background: rgba(39, 42, 46, 0.4); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px); 
        }

        /* Ingen linjer - kun tonal dybde */
        .tonal-card { background-color: #272a2e; border: none; }
        
        /* Mission Success Pulse */
        @keyframes missionGlow {
            0% { box-shadow: 0 0 5px #00e5ff; }
            50% { box-shadow: 0 0 25px #00e5ff; }
            100% { box-shadow: 0 0 5px #00e5ff; }
        }
        .mission-success { animation: missionGlow 1.5s infinite; border: 2px solid #00e5ff !important; }

        .scanner-line { 
            height: 2px; 
            background: #00e5ff; 
            position: absolute; 
            width: 100%; 
            animation: scan 2s linear infinite; 
            box-shadow: 0 0 15px #00e5ff;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        
        /* Fjern alle afrundede hjørner */
        * { border-radius: 0px !important; }
    </style>
</head>
<body class="text-on-surface min-h-screen pb-32">

    <header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary-cyan text-xl">rebase_edit</span>
            <span class="font-black text-xs tracking-[0.2em]">BIO-SCOUT // PRO</span>
        </div>
        <div class="bg-primary-cyan/10 px-2 py-1">
            <span id="rank-tag" class="text-[9px] font-black text-primary-cyan">RANK #142</span>
        </div>
    </header>

    <main class="pt-24 px-6 max-w-md mx-auto space-y-8">
        
        <section class="bg-surface-high p-6 shadow-2xl">
            <p class="text-[10px] font-bold text-primary-cyan tracking-[0.2em] mb-1">BIO-POINTS</p>
            <h2 id="xp-display" class="text-6xl font-black italic tracking-tighter leading-none">0</h2>
            <div class="mt-4 h-1 bg-white/5 w-full">
                <div id="xp-bar" class="h-full bg-primary-cyan transition-all duration-700" style="width: 5%"></div>
            </div>
        </section>

        <section class="space-y-3">
            <div class="flex justify-between items-end px-1">
                <h3 class="text-[10px] font-black text-gray-500 tracking-[0.3em]">Active Objective</h3>
                <span class="text-[9px] font-bold text-primary-cyan">NT-718</span>
            </div>
            <div id="mission-card" class="bg-surface-high p-5 relative overflow-hidden">
                <div class="relative z-10">
                    <h4 class="text-lg font-black leading-tight mb-1">Botanical Recovery</h4>
                    <p class="text-xs text-on-surface/60 italic">Find og scan en blomstrende Anemone.</p>
                </div>
                <div class="absolute bottom-0 left-0 h-1 bg-primary-cyan/20 w-full">
                    <div id="mission-progress" class="h-full bg-primary-cyan transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <section id="result-box" class="hidden">
            <div id="result-panel" class="bg-surface-high p-6 relative transition-all">
                <p class="text-[9px] font-black text-primary-cyan tracking-[0.2em] mb-2 uppercase italic">Data Link Established</p>
                <h3 id="ai-response" class="text-3xl font-black leading-none mb-3 uppercase">Scanning...</h3>
                <p id="ai-details" class="text-sm italic opacity-70 leading-relaxed border-t border-white/10 pt-4"></p>
            </div>
        </section>

        <section class="space-y-3">
            <h3 class="text-[10px] font-black text-gray-500 tracking-[0.3em] px-1">Field Logbook</h3>
            <div id="collection-list" class="space-y-2">
                </div>
        </section>
    </main>

    <button id="camera-btn" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-20 h-20 bg-primary-cyan flex items-center justify-center shadow-[0_0_40px_rgba(0,229,255,0.3)] active:scale-95 transition-transform z-50">
        <span class="material-symbols-outlined text-background text-4xl font-black">center_focus_strong</span>
    </button>

    <div id="scanner" class="hidden fixed inset-0 bg-background z-[100] flex flex-col">
        <video id="video" class="w-full h-full object-cover opacity-60" autoplay playsinline></video>
        <div class="scanner-line"></div>
        <div class="absolute inset-0 p-8 flex flex-col justify-between items-center pointer-events-none">
            <div class="w-full flex justify-between items-start pointer-events-auto">
                <div class="bg-surface-high px-3 py-1 font-black text-[10px] text-primary-cyan">SYSTEM_SCAN_ACTIVE</div>
                <button id="close-btn" class="text-white text-3xl font-light">✕</button>
            </div>
            <button id="capture-btn" class="w-24 h-24 border-4 border-primary-cyan bg-primary-cyan/10 pointer-events-auto active:bg-primary-cyan/40 mb-12"></button>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
    </div>

<script>
    // Din nye, fungerende nøgle og logik fra bio-scout-pro (1).html
    const API_KEY = "AIzaSyBtFSrIgzicXNKN-FYMUAzc3--zrkQmzNc";
    const MISSION_ID = "NT-718: Botanical (Anemone)";

    const cameraBtn = document.getElementById('camera-btn');
    const scanner = document.getElementById('scanner');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const closeBtn = document.getElementById('close-btn');
    const resultBox = document.getElementById('result-box');
    const resultPanel = document.getElementById('result-panel');
    const aiResponse = document.getElementById('ai-response');
    const aiDetails = document.getElementById('ai-details');
    const xpDisplay = document.getElementById('xp-display');
    const xpBar = document.getElementById('xp-bar');
    const missionProgress = document.getElementById('mission-progress');
    const collectionList = document.getElementById('collection-list');

    let xp = parseInt(localStorage.getItem('scoutXP')) || 0;

    function updateUI() {
        const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
        xpDisplay.innerText = xp;
        xpBar.style.width = Math.min((xp % 1000) / 10, 100) + "%";

        const missionDone = localStorage.getItem('missionNT718') === 'complete';
        missionProgress.style.width = missionDone ? "100%" : "20%";

        collectionList.innerHTML = finds.length === 0 ? 
            `<p class="text-[10px] text-gray-600 uppercase italic px-1">Logbook empty.</p>` : "";
        
        finds.slice().reverse().forEach(f => {
            const item = document.createElement('div');
            item.className = "bg-surface-high p-4 flex justify-between items-center";
            item.innerHTML = `<div><p class="text-[9px] font-bold text-primary-cyan">${f.date}</p><p class="text-lg font-black uppercase text-white leading-none mt-1 italic">${f.name}</p></div><span class="material-symbols-outlined text-primary-cyan text-sm">verified</span>`;
            collectionList.appendChild(item);
        });
    }

    function stopStream() { if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; } }

    cameraBtn.onclick = async () => {
        scanner.classList.remove('hidden');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (e) { alert("Access Denied."); scanner.classList.add('hidden'); }
    };

    closeBtn.onclick = () => { stopStream(); scanner.classList.add('hidden'); };

    captureBtn.onclick = async () => {
        if (!video.videoWidth) return;
        captureBtn.disabled = true;
        const scale = 720 / video.videoWidth;
        canvas.width = 720;
        canvas.height = Math.round(video.videoHeight * scale);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL("image/jpeg", 0.6).split(',')[1];
        
        stopStream();
        scanner.classList.add('hidden');
        resultBox.classList.remove('hidden');
        resultPanel.classList.remove('mission-success');
        aiResponse.innerText = "LINKING...";
        aiDetails.innerText = "Analyzing species against Mission objective...";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-lite:generateContent?key=${API_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Identify species. Determine if matches: ${MISSION_ID}. Format: Line 1: NAME. Line 2: YES/NO. Line 3: 1 short sentence.` }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }] })
            });
            const data = await res.json();
            if (data.error) { aiResponse.innerText = "ERR " + data.error.code; return; }

            const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
            const lines = text.split("\n").filter(l => l.trim());
            const name = (lines[0] || "UNKNOWN").replace(/[*#]/g, '').trim().toUpperCase();
            const isMatch = (lines[1] || "").toUpperCase().includes("YES");
            const detail = lines.slice(2).join(" ").replace(/[*#]/g, '').trim();

            const isValid = name.length > 2 && name !== "UNKNOWN";
            if (isMatch) {
                aiResponse.innerText = "OBJECTIVE MET";
                aiDetails.innerText = `${name}: ${detail}`;
                resultPanel.classList.add('mission-success');
                localStorage.setItem('missionNT718', 'complete');
                if (isValid) xp += 500;
            } else {
                aiResponse.innerText = name;
                aiDetails.innerText = detail;
                if (isValid) xp += 100;
            }

            if (isValid) {
                const today = new Date().toLocaleDateString('da-DK');
                const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
                if (!finds.some(f => f.name === name && f.date === today)) {
                    finds.push({ name, date: today });
                    localStorage.setItem('scoutFinds', JSON.stringify(finds));
                }
                localStorage.setItem('scoutXP', xp);
                updateUI();
            }
        } catch (e) { aiResponse.innerText = "LINK_LOST"; }
        finally { captureBtn.disabled = false; }
    };

    updateUI();
</script>
</body>
</html>
