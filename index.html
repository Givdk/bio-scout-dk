<!DOCTYPE html>
<html class="dark" lang="da">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "background": "#111417",
              "surface-high": "#272a2e",
              "primary-cyan": "#00e5ff",
              "on-surface": "#e1e2e8",
            },
            fontFamily: { "sans": ["Inter"] },
            borderRadius: { "none": "0px" },
          },
        },
      }
    </script>
    <style>
        body { background-color: #111417; letter-spacing: -0.01em; }
        h1,h2,h3,h4 { letter-spacing: -0.02em; font-style: italic; }
        * { border-radius: 0px !important; }
        .habitat-tile { position: relative; overflow: hidden; cursor: pointer; background-color: #272a2e; transition: transform 0.15s ease; }
        .habitat-tile:active { transform: scale(0.97); }
        .habitat-tile .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 60%); z-index: 1; }
        .habitat-tile img.bg-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; z-index: 0; }
        .habitat-tile:active img.bg-img { transform: scale(1.04); }
        .habitat-tile .tile-content { position: absolute; bottom: 0; left: 0; padding: 12px; z-index: 2; }
        .animal-img { width: 52px; height: 52px; object-fit: cover; flex-shrink: 0; filter: brightness(0.9); }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
        .live-dot { width:6px; height:6px; background:#00e5ff; animation: pulse 1.5s infinite; flex-shrink:0; }
        .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        .nav-active { color: #00e5ff; }
        .nav-inactive { color: rgba(255,255,255,0.25); }
        .lang-btn-active { background-color: #00e5ff; color: #111417; }
    </style>
</head>
<body class="text-on-surface min-h-screen pb-28">

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 bg-[#111417]/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary-cyan text-xl">rebase_edit</span>
            <span class="font-black text-xs tracking-[0.2em] uppercase">BIO-SCOUT // PRO</span>
        </div>
        <div class="flex items-center gap-3">
            <!-- Sprogskift synkroniseret med scanner -->
            <div class="flex border border-white/10 text-[9px] font-black">
                <button id="btn-da" class="px-2 py-1 lang-btn-active" onclick="setLang('da')">DA</button>
                <button id="btn-en" class="px-2 py-1 text-white/40" onclick="setLang('en')">EN</button>
            </div>
            <div class="flex items-center gap-2">
                <div class="live-dot"></div>
                <span class="text-[9px] font-black text-primary-cyan uppercase tracking-widest">Live</span>
            </div>
        </div>
    </header>

    <main class="pt-24 px-4 max-w-lg mx-auto space-y-8 pb-4">

        <!-- Hero -->
        <section class="reveal">
            <p id="hero-season" class="text-[10px] font-black text-primary-cyan uppercase tracking-[0.3em] mb-1"></p>
            <h1 class="text-4xl font-black uppercase italic leading-none text-white">Find.<br/>Scan.<br/>Log.</h1>
            <p id="hero-sub" class="text-xs text-on-surface/50 mt-3 italic"></p>
        </section>

        <!-- Stats -->
        <section class="reveal">
            <p id="label-status" class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-3"></p>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-surface-high p-4">
                    <p class="text-[9px] font-bold text-primary-cyan uppercase tracking-widest mb-1">XP</p>
                    <p id="stat-xp" class="text-2xl font-black italic text-white leading-none">0</p>
                </div>
                <div class="bg-surface-high p-4">
                    <p id="label-finds" class="text-[9px] font-bold text-primary-cyan uppercase tracking-widest mb-1"></p>
                    <p id="stat-finds" class="text-2xl font-black italic text-white leading-none">0</p>
                </div>
                <div class="bg-surface-high p-4">
                    <p id="label-missions" class="text-[9px] font-bold text-primary-cyan uppercase tracking-widest mb-1"></p>
                    <p id="stat-missions" class="text-2xl font-black italic text-white leading-none">0</p>
                </div>
            </div>
        </section>

        <!-- Habitat Grid + Kort toggle -->
        <section class="reveal">
            <div class="flex justify-between items-center mb-3">
                <p id="label-habitats" class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]"></p>
                <div class="flex border border-white/10 text-[9px] font-black">
                    <button id="tab-grid" class="px-3 py-1 lang-btn-active" onclick="showTab('grid')">
                        <span class="material-symbols-outlined text-[14px] align-middle">grid_view</span>
                    </button>
                    <button id="tab-map" class="px-3 py-1 text-white/40" onclick="showTab('map')">
                        <span class="material-symbols-outlined text-[14px] align-middle">map</span>
                    </button>
                </div>
            </div>
            <div id="habitat-grid" class="grid grid-cols-2 gap-2"></div>
            <div id="habitat-map" class="hidden w-full h-64 bg-surface-high relative overflow-hidden">
                <iframe
                    src="https://www.openstreetmap.org/export/embed.html?bbox=8.0,54.5,15.5,57.8&layer=mapnik"
                    class="w-full h-full border-0"
                    title="Naturomrader i Danmark"
                    loading="lazy">
                </iframe>
                <div class="absolute bottom-0 left-0 right-0 bg-background/80 px-3 py-2">
                    <p id="map-hint" class="text-[9px] text-gray-500 uppercase italic"></p>
                </div>
            </div>
        </section>

        <!-- Trending -->
        <section class="reveal">
            <p id="label-trending" class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-3"></p>
            <div class="space-y-2" id="trending-list"></div>
        </section>

        <!-- Seneste Fund -->
        <section class="reveal">
            <div class="flex justify-between items-end mb-3">
                <p id="label-recent" class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]"></p>
                <div class="flex items-center gap-1.5">
                    <div class="live-dot"></div>
                    <span class="text-[9px] font-black text-primary-cyan uppercase">Live</span>
                </div>
            </div>
            <div id="recent-finds" class="space-y-2"></div>
        </section>

        <!-- Dyr -->
        <section class="reveal">
            <p id="label-animals" class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em] mb-3"></p>
            <div class="space-y-2" id="animals-list"></div>
        </section>

        <!-- CTA -->
        <section class="reveal pb-4">
            <button onclick="goScanner()" class="w-full bg-primary-cyan py-5 flex items-center justify-center gap-3 active:scale-95 transition-transform shadow-[0_0_40px_rgba(0,229,255,0.2)]">
                <span class="material-symbols-outlined text-background text-2xl">center_focus_strong</span>
                <span id="cta-label" class="font-black uppercase text-background tracking-[0.15em] text-sm"></span>
            </button>
        </section>

    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full bg-[#111417]/95 backdrop-blur-md border-t border-white/5 flex justify-around items-center px-6 py-4 z-50">
        <div class="nav-active flex flex-col items-center gap-1">
            <span class="material-symbols-outlined text-xl">home</span>
            <span id="nav-home" class="text-[8px] font-black uppercase"></span>
        </div>
        <button onclick="goScanner()" class="nav-inactive flex flex-col items-center gap-1">
            <span class="material-symbols-outlined text-xl">center_focus_strong</span>
            <span id="nav-scanner" class="text-[8px] font-black uppercase"></span>
        </button>
        <div class="nav-inactive flex flex-col items-center gap-1">
            <span class="material-symbols-outlined text-xl">map</span>
            <span id="nav-map" class="text-[8px] font-black uppercase"></span>
        </div>
        <div class="nav-inactive flex flex-col items-center gap-1">
            <span class="material-symbols-outlined text-xl">person</span>
            <span id="nav-profile" class="text-[8px] font-black uppercase"></span>
        </div>
    </nav>

<script>
    // ─── SPROG DATA ───────────────────────────────────────────────
    const UI = {
        da: {
            season:   "Sæson: Forår 2026",
            heroSub:  "Udforsk dansk natur — ét scan ad gangen.",
            status:   "Din Status",
            finds:    "Fund",
            missions: "Missioner",
            habitats: "Naturområder",
            trending: "Trending i Danmark",
            recent:   "Seneste Fund",
            animals:  "Dyr i Danmark",
            cta:      "Start Scanner",
            noFinds:  "Ingen fund endnu — start scanneren!",
            mapHint:  "Tryk på kortet for at zoome ind på naturområder.",
            navHome:  "Hjem",
            navScan:  "Scanner",
            navMap:   "Kort",
            navProf:  "Profil",
            habitats_data: [
                { key: "Skov",  label: "Skov",  count: "48 arter registreret", img: "https://images.unsplash.com/photo-1448375240586-882707db888b?w=600&q=80" },
                { key: "Kyst",  label: "Kyst",  count: "31 arter registreret", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&q=80" },
                { key: "Eng",   label: "Eng",   count: "27 arter registreret", img: "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=600&q=80" },
                { key: "Mose",  label: "Mose",  count: "19 arter registreret", img: "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&q=80" },
            ],
            trending_data: [
                { name: "Blåmejse",  count: "247 fund" },
                { name: "Anemone",   count: "189 fund" },
                { name: "Rødræv",    count: "134 fund" },
                { name: "Skovmærke", count: "98 fund" },
                { name: "Musvit",    count: "87 fund" },
            ],
            animals_data: [
                { name: "Rødræv",              habitat: "Skov / Eng",   status: "Almindelig", img: "https://images.unsplash.com/photo-1474511320723-9a56873867b5?w=200&q=80" },
                { name: "Grævling",            habitat: "Skov",          status: "Almindelig", img: "https://images.unsplash.com/photo-1589656966895-2f33e7653819?w=200&q=80" },
                { name: "Kronhjort",           habitat: "Skov",          status: "Almindelig", img: "https://images.unsplash.com/photo-1484406566174-9da000fda645?w=200&q=80" },
                { name: "Odder",               habitat: "Å / Sø",        status: "Sårbar",     img: "https://images.unsplash.com/photo-1559181567-c3190ca9be50?w=200&q=80" },
                { name: "Marsvin",             habitat: "Kyst",          status: "Sårbar",     img: "https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=200&q=80" },
                { name: "Stor Vandsalamander", habitat: "Mose / Sø",     status: "Sårbar",     img: "https://images.unsplash.com/photo-1504450874802-0ba2bcd9b5ae?w=200&q=80" },
                { name: "Blåmejse",            habitat: "Skov / Have",   status: "Almindelig", img: "https://images.unsplash.com/photo-1444464666168-49d633b86797?w=200&q=80" },
                { name: "Isfugl",              habitat: "Å / Kyst",      status: "Sjælden",    img: "https://images.unsplash.com/photo-1520637836993-5f00d5749c59?w=200&q=80" },
            ],
            rare: ["Sjælden", "Sårbar"],
        },
        en: {
            season:   "Season: Spring 2026",
            heroSub:  "Explore Danish nature — one scan at a time.",
            status:   "Your Status",
            finds:    "Finds",
            missions: "Missions",
            habitats: "Natural Habitats",
            trending: "Trending in Denmark",
            recent:   "Recent Finds",
            animals:  "Animals in Denmark",
            cta:      "Start Scanner",
            noFinds:  "No finds yet — start scanning!",
            mapHint:  "Tap the map to explore nature areas.",
            navHome:  "Home",
            navScan:  "Scanner",
            navMap:   "Map",
            navProf:  "Profile",
            habitats_data: [
                { key: "Forest", label: "Forest", count: "48 species logged", img: "https://images.unsplash.com/photo-1448375240586-882707db888b?w=600&q=80" },
                { key: "Coast",  label: "Coast",  count: "31 species logged", img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&q=80" },
                { key: "Meadow", label: "Meadow", count: "27 species logged", img: "https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=600&q=80" },
                { key: "Bog",    label: "Bog",    count: "19 species logged", img: "https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600&q=80" },
            ],
            trending_data: [
                { name: "Blue Tit",       count: "247 finds" },
                { name: "Anemone",        count: "189 finds" },
                { name: "Red Fox",        count: "134 finds" },
                { name: "Sweet Woodruff", count: "98 finds" },
                { name: "Great Tit",      count: "87 finds" },
            ],
            animals_data: [
                { name: "Red Fox",                habitat: "Forest / Meadow", status: "Common",     img: "https://images.unsplash.com/photo-1474511320723-9a56873867b5?w=200&q=80" },
                { name: "Badger",                 habitat: "Forest",          status: "Common",     img: "https://images.unsplash.com/photo-1589656966895-2f33e7653819?w=200&q=80" },
                { name: "Red Deer",               habitat: "Forest",          status: "Common",     img: "https://images.unsplash.com/photo-1484406566174-9da000fda645?w=200&q=80" },
                { name: "Otter",                  habitat: "River / Lake",    status: "Vulnerable", img: "https://images.unsplash.com/photo-1559181567-c3190ca9be50?w=200&q=80" },
                { name: "Harbour Porpoise",       habitat: "Coast",           status: "Vulnerable", img: "https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=200&q=80" },
                { name: "Great Crested Newt",     habitat: "Bog / Lake",      status: "Vulnerable", img: "https://images.unsplash.com/photo-1504450874802-0ba2bcd9b5ae?w=200&q=80" },
                { name: "Blue Tit",               habitat: "Forest / Garden", status: "Common",     img: "https://images.unsplash.com/photo-1444464666168-49d633b86797?w=200&q=80" },
                { name: "Common Kingfisher",      habitat: "River / Coast",   status: "Rare",       img: "https://images.unsplash.com/photo-1520637836993-5f00d5749c59?w=200&q=80" },
            ],
            rare: ["Rare", "Vulnerable"],
        }
    };

    // ─── STATE ───────────────────────────────────────────────────
    let lang = localStorage.getItem('scoutLang') || 'da';

    function setLang(l) {
        lang = l;
        localStorage.setItem('scoutLang', l);
        document.getElementById('btn-da').className = l === 'da' ? "px-2 py-1 lang-btn-active" : "px-2 py-1 text-white/40";
        document.getElementById('btn-en').className = l === 'en' ? "px-2 py-1 lang-btn-active" : "px-2 py-1 text-white/40";
        renderAll();
    }

    function showTab(tab) {
        const grid = document.getElementById('habitat-grid');
        const map  = document.getElementById('habitat-map');
        const tGrid = document.getElementById('tab-grid');
        const tMap  = document.getElementById('tab-map');
        if (tab === 'grid') {
            grid.classList.remove('hidden');
            map.classList.add('hidden');
            tGrid.className = "px-3 py-1 lang-btn-active";
            tMap.className  = "px-3 py-1 text-white/40";
        } else {
            grid.classList.add('hidden');
            map.classList.remove('hidden');
            tGrid.className = "px-3 py-1 text-white/40";
            tMap.className  = "px-3 py-1 lang-btn-active";
        }
    }

    function goScanner(habitat) {
        if (habitat) localStorage.setItem('activeHabitat', habitat);
        window.location.href = 'scanner.html';
    }

    // ─── RENDER ──────────────────────────────────────────────────
    function renderAll() {
        const u = UI[lang];
        const finds     = JSON.parse(localStorage.getItem('scoutFinds')) || [];
        const completed = JSON.parse(localStorage.getItem('completedMissions')) || [];
        const xp        = parseInt(localStorage.getItem('scoutXP')) || 0;

        // Labels
        document.getElementById('hero-season').innerText   = u.season;
        document.getElementById('hero-sub').innerText      = u.heroSub;
        document.getElementById('label-status').innerText  = u.status;
        document.getElementById('label-finds').innerText   = u.finds;
        document.getElementById('label-missions').innerText = u.missions;
        document.getElementById('label-habitats').innerText = u.habitats;
        document.getElementById('label-trending').innerText = u.trending;
        document.getElementById('label-recent').innerText  = u.recent;
        document.getElementById('label-animals').innerText = u.animals;
        document.getElementById('cta-label').innerText     = u.cta;
        document.getElementById('nav-home').innerText      = u.navHome;
        document.getElementById('nav-scanner').innerText   = u.navScan;
        document.getElementById('nav-map').innerText       = u.navMap;
        document.getElementById('nav-profile').innerText   = u.navProf;
        if (document.getElementById('map-hint')) document.getElementById('map-hint').innerText = u.mapHint || '';

        // Stats
        document.getElementById('stat-xp').innerText       = xp;
        document.getElementById('stat-finds').innerText    = finds.length;
        document.getElementById('stat-missions').innerText = completed.length;

        // Habitat grid
        const grid = document.getElementById('habitat-grid');
        grid.innerHTML = "";
        u.habitats_data.forEach(h => {
            const tile = document.createElement('div');
            tile.className = "habitat-tile h-36";
            tile.onclick = () => goScanner(h.key);
            const img = document.createElement('img');
            img.className = "bg-img";
            img.src = h.img;
            img.alt = h.label;
            img.loading = "lazy";
            const overlay = document.createElement('div');
            overlay.className = "overlay";
            const content = document.createElement('div');
            content.className = "tile-content";
            content.innerHTML = `
                <p class="text-[9px] font-bold text-primary-cyan uppercase tracking-widest">Habitat</p>
                <p class="text-lg font-black uppercase text-white italic leading-none">${h.label}</p>
                <p class="text-[9px] text-white/50 mt-0.5">${h.count}</p>`;
            tile.appendChild(img);
            tile.appendChild(overlay);
            tile.appendChild(content);
            grid.appendChild(tile);
        });

        // Trending
        const trendEl = document.getElementById('trending-list');
        trendEl.innerHTML = "";
        u.trending_data.forEach((t, i) => {
            const item = document.createElement('div');
            item.className = "bg-surface-high p-4 flex justify-between items-center";
            const left = document.createElement('div');
            left.className = "flex items-center gap-3";
            const num = document.createElement('span');
            num.className = "text-[10px] font-black text-primary-cyan w-4";
            num.innerText = String(i + 1).padStart(2, '0');
            const nameEl = document.createElement('p');
            nameEl.className = "text-sm font-black uppercase text-white italic";
            nameEl.innerText = t.name;
            left.appendChild(num);
            left.appendChild(nameEl);
            const countEl = document.createElement('p');
            countEl.className = "text-[9px] text-gray-500 uppercase font-bold";
            countEl.innerText = t.count;
            item.appendChild(left);
            item.appendChild(countEl);
            trendEl.appendChild(item);
        });

        // Seneste fund
        const recentEl = document.getElementById('recent-finds');
        recentEl.innerHTML = "";
        if (finds.length === 0) {
            const empty = document.createElement('div');
            empty.className = "bg-surface-high p-4";
            const t = document.createElement('p');
            t.className = "text-[10px] text-gray-600 uppercase italic";
            t.innerText = u.noFinds;
            empty.appendChild(t);
            recentEl.appendChild(empty);
        } else {
            finds.slice().reverse().slice(0, 5).forEach(f => {
                const item = document.createElement('div');
                item.className = "bg-surface-high p-4 flex justify-between items-center";
                const left = document.createElement('div');
                const dateEl = document.createElement('p');
                dateEl.className = "text-[9px] font-bold text-primary-cyan uppercase";
                dateEl.innerText = f.displayDate || f.date;
                const nameEl = document.createElement('p');
                nameEl.className = "text-base font-black uppercase text-white italic leading-none mt-1";
                nameEl.innerText = f.name;
                left.appendChild(dateEl);
                left.appendChild(nameEl);
                const icon = document.createElement('span');
                icon.className = "material-symbols-outlined text-primary-cyan text-sm";
                icon.innerText = "verified";
                item.appendChild(left);
                item.appendChild(icon);
                recentEl.appendChild(item);
            });
        }

        // Dyr
        const animalsEl = document.getElementById('animals-list');
        animalsEl.innerHTML = "";
        u.animals_data.forEach(a => {
            const item = document.createElement('div');
            item.className = "bg-surface-high flex items-center gap-3 overflow-hidden";
            const img = document.createElement('img');
            img.className = "animal-img";
            img.src = a.img;
            img.alt = a.name;
            img.loading = "lazy";
            const info = document.createElement('div');
            info.className = "flex-1 py-3 pr-3 flex justify-between items-center";
            const left = document.createElement('div');
            const nameEl = document.createElement('p');
            nameEl.className = "text-sm font-black uppercase text-white italic leading-none";
            nameEl.innerText = a.name;
            const habEl = document.createElement('p');
            habEl.className = "text-[9px] text-gray-500 uppercase mt-1";
            habEl.innerText = a.habitat;
            left.appendChild(nameEl);
            left.appendChild(habEl);
            const statusEl = document.createElement('p');
            statusEl.className = `text-[9px] font-black uppercase ${u.rare.includes(a.status) ? 'text-primary-cyan' : 'text-gray-600'}`;
            statusEl.innerText = a.status;
            info.appendChild(left);
            info.appendChild(statusEl);
            item.appendChild(img);
            item.appendChild(info);
            animalsEl.appendChild(item);
        });
    }

    // ─── SCROLL REVEAL ───────────────────────────────────────────
    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

    // ─── INIT ────────────────────────────────────────────────────
    setLang(lang);
