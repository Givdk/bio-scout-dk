<!DOCTYPE html>
<html class="dark" lang="da">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | Pro Edition Fixed</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#111417",
              "surface": "#1d2024",
              "primary-container": "#00e5ff",
              "on-surface": "#e1e2e8",
            },
            borderRadius: {"DEFAULT": "0px"}
          },
        },
      }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111417; }
        .glass-panel {
            background: rgba(50, 53, 57, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .primary-gradient { background: linear-gradient(135deg, #9cf0ff 0%, #00e5ff 100%); }
        .scanner-line { height: 2px; background: #00e5ff; position: absolute; width: 100%; animation: scan 2s linear infinite; box-shadow: 0 0 20px #00e5ff; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>

<body class="bg-background text-on-surface pb-40">

<header class="fixed top-0 w-full z-[60] bg-background/80 backdrop-blur-xl px-6 h-16 flex justify-between items-center border-b border-white/5">
    <div class="flex items-center gap-2">
        <div class="w-2 h-2 bg-primary-container rounded-full animate-pulse"></div>
        <h1 class="font-black uppercase tracking-tighter text-xl text-primary-container">Bio-Scout</h1>
    </div>
    <div class="px-3 py-1 bg-surface border border-white/10 text-[10px] font-black" id="lvl-tag">LVL 01</div>
</header>

<main class="pt-20 px-4 max-w-lg mx-auto space-y-6">

    <div class="grid grid-cols-4 gap-2">
        <div class="glass-panel p-3 flex flex-col items-center gap-1 border-b-2 border-primary-container">
            <span class="material-symbols-outlined text-xl">forest</span>
            <span class="text-[8px] font-bold uppercase">Skov</span>
        </div>
        <div class="glass-panel p-3 flex flex-col items-center gap-1 opacity-40">
            <span class="material-symbols-outlined text-xl">waves</span>
            <span class="text-[8px] font-bold uppercase">Sø</span>
        </div>
        <div class="glass-panel p-3 flex flex-col items-center gap-1 opacity-40">
            <span class="material-symbols-outlined text-xl">landscape</span>
            <span class="text-[8px] font-bold uppercase">Eng</span>
        </div>
        <div class="glass-panel p-3 flex flex-col items-center gap-1 opacity-40">
            <span class="material-symbols-outlined text-xl">potted_plant</span>
            <span class="text-[8px] font-bold uppercase">Have</span>
        </div>
    </div>

    <section class="glass-panel p-5">
        <div class="flex justify-between items-end mb-4">
            <div>
                <p class="text-[10px] font-bold text-primary-container uppercase tracking-widest mb-1">Erfaring</p>
                <h2 id="xp-display" class="text-3xl font-black italic">0 XP</h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Fund</p>
                <h2 id="count-display" class="text-xl font-black">0</h2>
            </div>
        </div>
        <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
            <div id="xp-progress" class="h-full bg-primary-container transition-all duration-700" style="width: 5%"></div>
        </div>
    </section>

    <section id="result-box" class="hidden">
        <div class="glass-panel p-6 border-l-4 border-primary-container bg-primary-container/5">
            <h3 id="ai-response" class="text-2xl font-black uppercase text-white">Analyserer...</h3>
            <p id="ai-details" class="text-sm text-on-surface/70 mt-2 italic"></p>
        </div>
    </section>

    <div>
        <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-4 px-1">Logbog</h3>
        <div id="collection-list" class="space-y-3"></div>
    </div>

</main>

<button id="camera-btn" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] w-20 h-20 primary-gradient rounded-none flex items-center justify-center shadow-[0_0_50px_rgba(0,229,255,0.5)] active:scale-90 transition-all border-4 border-background">
    <span class="material-symbols-outlined font-black text-4xl text-background">photo_camera</span>
</button>

<div id="scanner" class="hidden fixed inset-0 bg-background z-[110] flex flex-col">
    <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
    <div class="scanner-line"></div>
    <div class="absolute inset-0 p-8 flex flex-col justify-between pointer-events-none">
        <div class="flex justify-between items-start">
            <div class="glass-panel px-4 py-2 border-l-2 border-primary-container">
                <p class="text-[10px] font-black uppercase text-primary-container tracking-widest">Bio-Link Active</p>
            </div>
            <button id="close-btn" class="pointer-events-auto text-white text-4xl">✕</button>
        </div>
        <div class="flex justify-center mb-10">
            <button id="capture-btn" class="pointer-events-auto w-20 h-20 border-4 border-white rounded-full bg-white/20 backdrop-blur-xl active:scale-95 transition-all"></button>
        </div>
    </div>
    <canvas id="canvas" class="hidden"></canvas>
</div>

<script>
    // DIN NYE NØGLE
    const API_KEY = "AIzaSyBWhyIp_g6xRYy5qyRXG0cVobGxxUU_64w";
    
    const cameraBtn = document.getElementById('camera-btn');
    const scanner = document.getElementById('scanner');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const closeBtn = document.getElementById('close-btn');
    const resultBox = document.getElementById('result-box');
    const aiResponse = document.getElementById('ai-response');
    const aiDetails = document.getElementById('ai-details');
    const xpDisplay = document.getElementById('xp-display');
    const countDisplay = document.getElementById('count-display');
    const collectionList = document.getElementById('collection-list');

    let xp = parseInt(localStorage.getItem('scoutXP')) || 0;

    function updateStats() {
        const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
        xpDisplay.innerText = xp + " XP";
        countDisplay.innerText = finds.length;
        if (finds.length > 0) collectionList.innerHTML = "";
        finds.slice().reverse().forEach(f => {
            const item = document.createElement('div');
            item.className = "glass-panel p-4 flex justify-between items-center border-l-2 border-primary-container mb-2";
            item.innerHTML = `<div><p class="text-[10px] font-bold text-primary-container uppercase">${f.date}</p><p class="text-md font-black uppercase text-white">${f.name}</p></div><span class="material-symbols-outlined text-primary-container">verified</span>`;
            collectionList.appendChild(item);
        });
    }

    updateStats();

    cameraBtn.onclick = async () => {
        scanner.classList.remove('hidden');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 1280 } } 
            });
            video.srcObject = stream;
        } catch (e) { alert("Kamera-adgang nægtet. Tjek indstillinger."); }
    };

    closeBtn.onclick = () => {
        if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        scanner.classList.add('hidden');
    };

    captureBtn.onclick = async () => {
        captureBtn.disabled = true;
        
        // Optimering af billede før upload
        canvas.width = 720; 
        canvas.height = video.videoHeight * (720 / video.videoWidth);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Konverter til base64 (0.6 kvalitet sparer data og undgår fejl)
        const base64 = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
        
        closeBtn.click();
        resultBox.classList.remove('hidden');
        aiResponse.innerText = "FORBINDER...";
        aiDetails.innerText = "Stitch AI uploader til server...";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Identificer denne danske art. Svar kort: Navn (STORE BOGSTAVER) og 1 kort info-sætning." },
                            { inline_data: { mime_type: "image/jpeg", data: base64 } }
                        ]
                    }]
                })
            });

            const data = await res.json();

            if (data.error) {
                aiResponse.innerText = "API FEJL";
                aiDetails.innerText = data.error.message;
                return;
            }

            const text = data.candidates[0].content.parts[0].text;
            const name = text.split('\n')[0].replace(/\*/g, '').trim();

            aiResponse.innerText = name;
            aiDetails.innerText = text.split('\n').slice(1).join(' ') || "Art bekræftet.";

            xp += 100;
            localStorage.setItem('scoutXP', xp);
            const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
            finds.push({ name: name, date: new Date().toLocaleDateString('da-DK') });
            localStorage.setItem('scoutFinds', JSON.stringify(finds));
            updateStats();

        } catch (e) { 
            aiResponse.innerText = "NETVÆRKSFEJL";
            aiDetails.innerText = "Tjek dit internet eller prøv igen.";
        } finally { 
            captureBtn.disabled = false; 
        }
    };
</script>
</script>
</body>
</html>
