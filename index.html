<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | Pro AI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111417; color: #e1e2e8; -webkit-tap-highlight-color: transparent; }
        .glass-panel {
            background: rgba(50, 53, 57, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .primary-gradient { background: linear-gradient(135deg, #9cf0ff 0%, #00e5ff 100%); }
        .scanner-line { height: 2px; background: #00e5ff; position: absolute; width: 100%; animation: scan 2s linear infinite; box-shadow: 0 0 20px #00e5ff; z-index: 10; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .active-tab { border-bottom: 2px solid #00e5ff; color: #00e5ff; opacity: 1 !important; }
    </style>
</head>

<body class="pb-40">

<header class="fixed top-0 w-full z-40 bg-[#111417]/80 backdrop-blur-xl px-6 h-16 flex justify-between items-center border-b border-white/5">
    <div class="flex items-center gap-2">
        <div class="w-2 h-2 bg-[#00e5ff] rounded-full animate-pulse"></div>
        <h1 class="font-black uppercase tracking-tighter text-xl text-[#00e5ff]">Bio-Scout</h1>
    </div>
    <div id="lvl-badge" class="px-3 py-1 bg-[#1d2024] border border-white/10 text-[10px] font-black uppercase">Lv. 01 Scout</div>
</header>

<main class="pt-24 px-4 max-w-lg mx-auto space-y-6">
    
    <div class="grid grid-cols-4 gap-2">
        <div class="glass-panel p-3 flex flex-col items-center gap-1 active-tab">
            <span class="material-symbols-outlined text-xl">forest</span>
            <span class="text-[8px] font-bold uppercase tracking-widest">Forest</span>
        </div>
        <div class="glass-panel p-3 flex flex-col items-center gap-1 opacity-40">
            <span class="material-symbols-outlined text-xl">waves</span>
            <span class="text-[8px] font-bold uppercase tracking-widest">Water</span>
        </div>
        <div class="glass-panel p-3 flex flex-col items-center gap-1 opacity-40">
            <span class="material-symbols-outlined text-xl">landscape</span>
            <span class="text-[8px] font-bold uppercase tracking-widest">Field</span>
        </div>
        <div class="glass-panel p-3 flex flex-col items-center gap-1 opacity-40">
            <span class="material-symbols-outlined text-xl">potted_plant</span>
            <span class="text-[8px] font-bold uppercase tracking-widest">Garden</span>
        </div>
    </div>

    <section class="glass-panel p-5">
        <div class="flex justify-between items-end mb-4">
            <div>
                <p class="text-[10px] font-bold text-[#00e5ff] uppercase tracking-widest mb-1">Total Experience</p>
                <h2 id="xp-display" class="text-3xl font-black italic text-white tracking-tighter">0 XP</h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Discoveries</p>
                <h2 id="count-display" class="text-xl font-black text-white">0</h2>
            </div>
        </div>
        <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
            <div id="xp-bar" class="h-full bg-[#00e5ff] transition-all duration-1000" style="width: 5%"></div>
        </div>
    </section>

    <section id="result-box" class="hidden">
        <div class="glass-panel p-6 border-l-4 border-[#00e5ff] bg-[#00e5ff]/5 relative overflow-hidden">
            <div class="absolute top-0 right-0 p-2 bg-[#00e5ff] text-[#111417] text-[9px] font-black tracking-widest">AI VERIFIED</div>
            <h3 id="ai-response" class="text-2xl font-black uppercase text-white tracking-tight leading-none">Scanning...</h3>
            <p id="ai-details" class="text-sm text-gray-400 mt-3 font-medium italic leading-relaxed"></p>
        </div>
    </section>

    <div>
        <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-4 px-1">Field Logbook</h3>
        <div id="collection-list" class="space-y-3">
             <div class="text-center py-10 border border-white/5 opacity-20">
                <p class="text-[10px] uppercase tracking-widest italic">No species discovered yet</p>
             </div>
        </div>
    </div>

</main>

<nav class="fixed bottom-0 w-full h-20 bg-[#111417] border-t border-white/5 flex justify-around items-center px-10 z-[80]">
    <button class="text-[#00e5ff] flex flex-col items-center">
        <span class="material-symbols-outlined">explore</span>
        <span class="text-[9px] font-bold uppercase mt-1">Explore</span>
    </button>
    <button class="text-white/20 flex flex-col items-center">
        <span class="material-symbols-outlined">map</span>
        <span class="text-[9px] font-bold uppercase mt-1">Map</span>
    </button>
</nav>

<button id="camera-btn" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] w-20 h-20 primary-gradient flex items-center justify-center shadow-[0_0_50px_rgba(0,229,255,0.4)] active:scale-90 transition-all border-8 border-[#111417]">
    <span class="material-symbols-outlined font-black text-4xl text-[#111417]">photo_camera</span>
</button>

<div id="scanner" class="hidden fixed inset-0 bg-[#111417] z-[110] flex flex-col overflow-hidden">
    <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
    <div class="scanner-line"></div>
    <div class="absolute inset-0 p-8 flex flex-col justify-between pointer-events-none">
        <div class="flex justify-between items-start">
            <div class="glass-panel px-4 py-2 border-l-2 border-[#00e5ff]">
                <p class="text-[10px] font-black uppercase text-[#00e5ff] tracking-widest">Bio-Link Active</p>
            </div>
            <button id="close-btn" class="pointer-events-auto text-white text-4xl font-light">✕</button>
        </div>
        <div class="flex justify-center mb-10">
            <button id="capture-btn" class="pointer-events-auto w-20 h-20 border-4 border-white rounded-full bg-white/20 backdrop-blur-xl active:scale-95 transition-all"></button>
        </div>
    </div>
    <canvas id="canvas" class="hidden"></canvas>
</div>

<script>
// UPDATED API KEY
const API_KEY = "AIzaSyDs0lCbNiSRRIBv2T06vNQTGgJUpCfsHCI";

const cameraBtn = document.getElementById('camera-btn');
const scanner = document.getElementById('scanner');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const captureBtn = document.getElementById('capture-btn');
const closeBtn = document.getElementById('close-btn');
const resultBox = document.getElementById('result-box');
const aiResponse = document.getElementById('ai-response');
const aiDetails = document.getElementById('ai-details');
const xpDisplay = document.getElementById('xp-display');
const countDisplay = document.getElementById('count-display');
const collectionList = document.getElementById('collection-list');
const xpBar = document.getElementById('xp-bar');

let xp = parseInt(localStorage.getItem('scoutXP')) || 0;

function updateStats() {
    const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
    xpDisplay.innerText = xp + " XP";
    countDisplay.innerText = finds.length;
    xpBar.style.width = Math.min((xp % 1000) / 10, 100) + "%";

    if (finds.length > 0) {
        collectionList.innerHTML = "";
        finds.slice().reverse().forEach(f => {
            const item = document.createElement('div');
            item.className = "glass-panel p-4 flex justify-between items-center border-l-2 border-[#00e5ff] mb-2";
            item.innerHTML = `<div><p class="text-[9px] font-bold text-[#00e5ff] uppercase tracking-widest">${f.date}</p><p class="text-md font-black uppercase text-white tracking-tight">${f.name}</p></div><span class="material-symbols-outlined text-[#00e5ff]">verified</span>`;
            collectionList.appendChild(item);
        });
    }
}
updateStats();

cameraBtn.onclick = async () => {
    scanner.style.display = "block";
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment", width: { ideal: 1280 } }
        });
        video.srcObject = stream;
    } catch {
        alert("Camera permission is required. Please check your browser settings.");
    }
};

closeBtn.onclick = () => {
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(t => t.stop());
    }
    scanner.style.display = "none";
};

captureBtn.onclick = async () => {
    captureBtn.disabled = true;

    try {
        const scale = 720 / video.videoWidth;
        canvas.width = 720;
        canvas.height = video.videoHeight * scale;
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL("image/jpeg", 0.6).split(',')[1];

        closeBtn.click();
        resultBox.style.display = "block";
        aiResponse.innerText = "CONNECTING...";
        aiDetails.innerText = "Processing biological data via Bio-Link...";

        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Identify the species in this image. Answer in English: Name (ALL CAPS) first, then 1 short descriptive sentence." },
                            { inlineData: { mimeType: "image/jpeg", data: base64 } }
                        ]
                    }]
                })
            }
        );

        const data = await res.json();
        
        if (data.error) {
            aiResponse.innerText = "API ERROR";
            aiDetails.innerText = data.error.message;
            return;
        }

        const textOutput = data?.candidates?.[0]?.content?.parts?.[0]?.text;
        const lines = textOutput.split("\n").map(l => l.trim()).filter(Boolean);
        const name = (lines[0] || "UNKNOWN").replace(/\*/g, '').toUpperCase();
        const detail = lines.slice(1).join(" ") || "Discovery confirmed.";

        aiResponse.innerText = name;
        aiDetails.innerText = detail;

        xp += 100;
        localStorage.setItem("scoutXP", xp);
        const finds = JSON.parse(localStorage.getItem("scoutFinds")) || [];
        finds.push({ name, date: new Date().toLocaleDateString() });
        localStorage.setItem("scoutFinds", JSON.stringify(finds));
        updateStats();

    } catch (e) {
        aiResponse.innerText = "SCAN FAILED";
        aiDetails.innerText = "Check your connection and try again.";
    } finally {
        captureBtn.disabled = false;
    }
};
</script>

</body>
</html>
