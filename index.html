<!DOCTYPE html>
<html class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <title>Bio-Scout | Base</title>
</head>
<body class="bg-[#111417] text-[#e1e2e8] pb-24">
    <header class="p-6 border-b border-white/5 font-black text-cyan-400 italic">BIO-SCOUT // PRO</header>

    <main class="p-6 space-y-10 max-w-md mx-auto">
        <h1 class="text-4xl font-black italic text-white leading-none">FIND.<br>SCAN.<br>LOG.</h1>

        <div id="habitats" class="grid grid-cols-2 gap-2"></div>

        <section>
            <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">Dyr i Danmark</p>
            <div id="animals" class="space-y-2"></div>
        </section>

        <button onclick="window.location.href='scanner.html'" class="w-full bg-cyan-400 py-5 text-black font-black uppercase shadow-[0_0_30px_rgba(0,229,255,0.2)]">
            Start Scanner
        </button>
    </main>

    <script>
        const habitatData = [
            { name: "Skov", icon: "forest", count: "48 arter" },
            { name: "Kyst", icon: "water", count: "31 arter" }
        ];

        const animalData = [
            { name: "Rødræv", hab: "Skov / Eng", status: "Almindelig" },
            { name: "Grævling", hab: "Skov", status: "Almindelig" },
            { name: "Isfugl", hab: "Å / Kyst", status: "Sjælden" }
        ];

        // Denne funktion bygger listen manuelt
        function render() {
            const hGrid = document.getElementById('habitats');
            const aList = document.getElementById('animals');
            
            hGrid.innerHTML = ""; // Rydder først
            habitatData.forEach(h => {
                hGrid.innerHTML += `<div class="bg-[#272a2e] p-4 h-32 relative flex items-end" onclick="window.location.href='scanner.html'"><span class="material-symbols-outlined absolute top-4 right-4 opacity-20 text-3xl">${h.icon}</span><p class="font-black italic text-white uppercase">${h.name}</p></div>`;
            });

            aList.innerHTML = ""; // Rydder først
            animalData.forEach(a => {
                aList.innerHTML += `<div class="bg-[#272a2e] p-4 flex justify-between items-center border-l-2 border-cyan-400"><div><p class="font-black italic text-white uppercase">${a.name}</p><p class="text-[10px] text-gray-500 uppercase">${a.hab}</p></div><span class="text-[9px] font-bold text-gray-400 uppercase">${a.status}</span></div>`;
            });
        }

        // VIKTIGT: Vi kalder funktionen her
        render();
    </script>
</body>
</html>
