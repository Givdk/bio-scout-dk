<!DOCTYPE html>
<html class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Bio-Scout | Fixed Home</title>
</head>
<body class="bg-[#111417] text-[#e1e2e8] p-6">
    <h1 class="text-4xl font-black italic text-white mb-8">BIO-SCOUT // BASE</h1>

    <section class="mb-10">
        <p class="text-[10px] font-black text-cyan-400 tracking-widest mb-4 uppercase">Naturområder</p>
        <div class="grid grid-cols-2 gap-2">
            <div onclick="window.location.href='scanner.html'" class="bg-[#272a2e] p-4 h-32 flex items-end font-black italic uppercase">Skov</div>
            <div onclick="window.location.href='scanner.html'" class="bg-[#272a2e] p-4 h-32 flex items-end font-black italic uppercase">Kyst</div>
        </div>
    </section>

    <section class="mb-10">
        <p class="text-[10px] font-black text-gray-500 tracking-widest mb-4 uppercase">Dyr i Danmark</p>
        <div class="space-y-2">
            <div class="bg-[#272a2e] p-4 border-l-2 border-cyan-400 flex justify-between items-center">
                <span class="font-black italic uppercase">Rødræv</span>
                <span class="text-[9px] text-gray-500 uppercase">Almindelig</span>
            </div>
            <div class="bg-[#272a2e] p-4 border-l-2 border-cyan-400 flex justify-between items-center">
                <span class="font-black italic uppercase">Grævling</span>
                <span class="text-[9px] text-gray-500 uppercase">Almindelig</span>
            </div>
            <div class="bg-[#272a2e] p-4 border-l-2 border-cyan-400 flex justify-between items-center">
                <span class="font-black italic uppercase">Isfugl</span>
                <span class="text-[9px] text-cyan-400 uppercase">Sjælden</span>
            </div>
        </div>
    </section>

    <button onclick="window.location.href='scanner.html'" class="w-full bg-cyan-400 py-5 text-black font-black uppercase shadow-[0_0_30px_rgba(0,229,255,0.2)]">
        Start Scanner
    </button>
</body>
</html>
