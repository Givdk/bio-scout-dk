<!DOCTYPE html>
<html class="dark" lang="da">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#111417",
              "surface": "#1d2024",
              "primary-container": "#00e5ff",
              "on-surface": "#e1e2e8",
              "card": "rgba(50, 53, 57, 0.4)"
            },
            borderRadius: {"DEFAULT": "0px"}
          },
        },
      }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        .glass-panel {
            background: rgba(50, 53, 57, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .primary-gradient { background: linear-gradient(135deg, #9cf0ff 0%, #00e5ff 100%); }
        .pulse-red { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
        .scanner-line { height: 2px; background: #00e5ff; position: absolute; width: 100%; animation: scan 2s linear infinite; box-shadow: 0 0 20px #00e5ff; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>

<body class="bg-background text-on-surface pb-32">

<header class="fixed top-0 w-full z-50 bg-background/60 backdrop-blur-xl px-6 h-16 flex justify-between items-center border-b border-white/5">
    <div class="flex items-center gap-2">
        <div class="w-2 h-2 bg-primary-container rounded-full pulse-red"></div>
        <h1 class="font-black uppercase tracking-tighter text-xl text-primary-container">Bio-Scout</h1>
    </div>
    <div id="lvl-badge" class="px-3 py-1 bg-surface border border-white/10 text-[10px] font-black">LVL 01</div>
</header>

<main class="pt-20 px-4 max-w-lg mx-auto space-y-6">

    <div class="grid grid-cols-4 gap-2">
        <div class="glass-panel p-3 flex flex-col items-center gap-1 border-b-2 border-primary-container">
            <span class="material-symbols-outlined text-sm">forest</span>
            <span class="text-[8px] font-bold uppercase">Skov</span>
        </div>
        <div class="glass-panel p-3 flex flex-col items-center gap-1 opacity-50">
            <span class="material-symbols-outlined text-sm">waves</span>
            <span class="text-[8px] font-bold uppercase">Sø</span>
        </div>
        <div class="glass-panel p-3 flex flex-col items-center gap-1 opacity-50">
            <span class="material-symbols-outlined text-sm">landscape</span>
            <span class="text-[8px] font-bold uppercase">Eng</span>
        </div>
        <div class="glass-panel p-3 flex flex-col items-center gap-1 opacity-50">
            <span class="material-symbols-outlined text-sm">potted_plant</span>
            <span class="text-[8px] font-bold uppercase">Have</span>
        </div>
    </div>

    <section class="glass-panel p-5 relative overflow-hidden">
        <div class="flex justify-between items-end mb-4">
            <div>
                <p class="text-[10px] font-bold text-primary-container uppercase tracking-widest mb-1">Total Erfaring</p>
                <h2 id="xp-display" class="text-3xl font-black italic">0 XP</h2>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Fundne Arter</p>
                <h2 id="count-display" class="text-xl font-black">0</h2>
            </div>
        </div>
        <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
            <div id="xp-progress" class="h-full bg-primary-container transition-all duration-1000" style="width: 5%"></div>
        </div>
    </section>

    <section id="result-box" class="hidden animate-in slide-in-from-top-4 duration-500">
        <div class="glass-panel p-6 border-l-4 border-primary-container bg-primary-container/5">
            <span class="text-[9px] font-black uppercase text-primary-container tracking-widest">AI Analyse Komplet</span>
            <h3 id="ai-response" class="text-2xl font-black uppercase text-white mt-1">Søger...</h3>
            <p id="ai-details" class="text-sm text-on-surface/70 mt-2 font-medium italic"></p>
        </div>
    </section>

    <div>
        <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-4">Seneste Fund</h3>
        <div id="collection-list" class="space-y-3">
            </div>
    </div>
