<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Scout DK | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1A1D21; color: #F0F0F0; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-blue { color: #00E5FF; }
        .bg-neon { background-color: #00E5FF; }
        .neon-glow { box-shadow: 0 0 25px rgba(0, 229, 255, 0.4); }
        @keyframes scan-line { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner-line { height: 2px; background: #00E5FF; position: absolute; width: 100%; animation: scan-line 2s linear infinite; box-shadow: 0 0 15px #00E5FF; z-index: 10; }
    </style>
</head>
<body class="p-4 pb-40">

    <header class="flex justify-between items-center mb-6 pt-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase leading-none">Bio-Scout <span class="neon-blue font-black">PRO</span></h1>
            <div class="flex items-center mt-2">
                <span class="text-[10px] font-bold text-[#00E5FF] mr-2">LVL <span id="lvl-display">1</span></span>
                <div class="w-24 h-1.5 bg-gray-800 rounded-full overflow-hidden">
                    <div id="xp-bar" class="h-full bg-neon transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>
        <div id="total-xp" class="text-[10px] font-mono text-gray-500">0 XP</div>
    </header>

    <section class="mb-6">
        <div class="glass p-4 rounded-3xl border-l-4 border-[#00E5FF]">
            <p class="text-[10px] uppercase tracking-widest text-[#00E5FF] font-bold mb-1">System Status</p>
            <p class="text-white text-xs font-medium" id="status-text">Klar til mission i felten...</p>
        </div>
    </section>

    <section id="result-box" class="hidden mb-6 scale-95 transition-all">
        <div class="glass p-6 rounded-3xl border border-[#00E5FF]/30 bg-[#00E5FF]/5 relative">
            <span class="absolute top-4 right-4 text-[10px] font-bold text-[#00E5FF]">+100 XP</span>
            <p id="ai-response" class="text-lg font-bold text-white mb-2 leading-tight">Analyserer...</p>
            <p id="ai-details" class="text-sm text-gray-400 italic font-light"></p>
        </div>
    </section>

    <section id="collection-sec">
        <h2 class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-black">Din Logbog</h2>
        <div id="collection-list" class="grid grid-cols-1 gap-3">
            <p class="text-xs text-gray-600 italic">Ingen fund endnu. Start din første mission!</p>
        </div>
    </section>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md glass rounded-[40px] py-4 px-10 flex justify-between items-center z-50 border border-white/10 shadow-2xl">
        <button onclick="window.location.reload()" class="text-gray-500">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
        </button>
        
        <button id="camera-btn" class="bg-neon p-5 rounded-3xl neon-glow -mt-16 transform active:scale-90 transition-all border-[6px] border-[#1A1D21]">
            <svg width="32" height="32" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </button>

        <button onclick="alert('Kort-funktion kommer snart!')" class="text-gray-500">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </button>
    </nav>

    <div id="scanner" class="hidden fixed inset-0 bg-black z-[100] flex flex-col overflow-hidden">
        <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
        <div class="scanner-line"></div>
        <button id="close-btn" class="absolute top-10 right-6 text-white text-5xl font-light">&times;</button>
        <div class="absolute bottom-12 w-full flex justify-center">
            <button id="capture-btn" class="w-20 h-20 rounded-full border-4 border-white bg-white/10 backdrop-blur-md shadow-2xl active:scale-95 transition-all"></button>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
    </div>

    <script>
        const API_KEY = "AIzaSyBEkiYyE2J5nAt1ZkZe0BJPLnqzcFVhLd8";
        
        // Elementer
        const cameraBtn = document.getElementById('camera-btn');
        const scanner = document.getElementById('scanner');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const closeBtn = document.getElementById('close-btn');
        const resultBox = document.getElementById('result-box');
        const aiResponse = document.getElementById('ai-response');
        const aiDetails = document.getElementById('ai-details');
        const statusText = document.getElementById('status-text');
        const collectionList = document.getElementById('collection-list');
        const xpBar = document.getElementById('xp-bar');
        const lvlDisplay = document.getElementById('lvl-display');
        const totalXpDisplay = document.getElementById('total-xp');

        // Stats Logic
        let xp = parseInt(localStorage.getItem('scoutXP')) || 0;
        
        function updateStats() {
            const level = Math.floor(xp / 500) + 1;
            const progress = ((xp % 500) / 500) * 100;
            lvlDisplay.innerText = level;
            xpBar.style.width = progress + "%";
            totalXpDisplay.innerText = xp + " XP";
            localStorage.setItem('scoutXP', xp);
        }

        function loadCollection() {
            const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
            if (finds.length > 0) collectionList.innerHTML = "";
            finds.slice().reverse().forEach(f => {
                const item = document.createElement('div');
                item.className = "glass p-4 rounded-2xl border border-white/5 flex justify-between items-center mb-2";
                item.innerHTML = `<div><p class="font-bold text-sm text-white">${f.name}</p><p class="text-[10px] text-gray-500 uppercase font-bold">${f.date}</p></div><div class="text-[#00E5FF] text-[10px] font-black tracking-widest">REGISTRERET</div>`;
                collectionList.appendChild(item);
            });
        }

        // Init stats
        updateStats();
        loadCollection();

        cameraBtn.onclick = async () => {
            scanner.classList.remove('hidden');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: 1280 } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Giv adgang til kameraet.");
            }
        };

        closeBtn.onclick = () => {
            if(video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
            scanner.classList.add('hidden');
        };

        captureBtn.onclick = async () => {
            statusText.innerText = "📸 Behandler data...";
            captureBtn.disabled = true;

            await new Promise(r => setTimeout(r, 500));
            canvas.width = 800;
            canvas.height = (video.videoHeight / video.videoWidth) * 800;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Image = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

            closeBtn.click();
            resultBox.classList.remove('hidden');
            aiResponse.innerText = "🤖 AI Analyserer...";
            statusText.innerText = "Identificerer art...";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Du er en dansk biolog. Identificer planten/dyret. Svar kort: Navn (fed), 1 sætning om fundstedet." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }]
                    })
                });

                const data = await res.json();
                const text = data.candidates[0].content.parts[0].text;
                const lines = text.split('\n');
                const name = lines[0].replace(/\*/g, '').trim();

                aiResponse.innerHTML = `<span class="text-[#00E5FF] font-black">${name}</span>`;
                aiDetails.innerText = lines.slice(1).join(' ') || "Almindelig i Danmark.";
                statusText.innerText = "Fund registreret!";

                // Gem Fund & Giv XP
                xp += 100;
                updateStats();
                const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
                finds.push({ name: name, date: new Date().toLocaleDateString('da-DK') });
                localStorage.setItem('scoutFinds', JSON.stringify(finds));
                loadCollection();

            } catch (err) {
                aiResponse.innerText = "⚠️ Prøv igen";
                statusText.innerText = "Scanning fejlede.";
            } finally {
                captureBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
