<!DOCTYPE html>
<html class="dark" lang="da">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | Pro AI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0c0e; color: #e1e2e8; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(25, 28, 32, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .primary-gradient { background: linear-gradient(135deg, #9cf0ff 0%, #00e5ff 100%); }
        .scanner-line { height: 2px; background: #00e5ff; position: absolute; width: 100%; animation: scan 2s linear infinite; box-shadow: 0 0 20px #00e5ff; z-index: 100; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
    </style>
</head>

<body class="pb-48">

    <header class="fixed top-0 w-full z-[50] bg-[#0a0c0e] border-b border-white/5 px-6 h-16 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#00e5ff]">menu_open</span>
            <h1 class="font-black uppercase tracking-widest text-lg text-white">NATURETRAILS</h1>
        </div>
        <div class="px-3 py-1 border border-white/10 text-[10px] font-black text-gray-400 uppercase">Lv. 01 Scout</div>
    </header>

    <main class="pt-24 px-4 max-w-lg mx-auto space-y-6">
        
        <section class="glass-panel p-6">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-[10px] font-bold text-[#00e5ff] uppercase tracking-widest mb-1 italic">Experience</p>
                    <h2 id="xp-display" class="text-5xl font-black italic tracking-tighter text-white leading-none">0 XP</h2>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 font-black">FUND</p>
                    <h2 id="count-display" class="text-xl font-black text-white">0</h2>
                </div>
            </div>
            <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                <div id="xp-bar" class="h-full bg-[#00e5ff] transition-all duration-1000" style="width: 5%"></div>
            </div>
        </section>

        <section id="result-box" class="hidden">
            <div class="glass-panel p-6 border-l-4 border-[#00e5ff] bg-[#00e5ff]/5 relative overflow-hidden">
                <p class="text-[9px] font-black text-[#00e5ff] uppercase tracking-[0.2em] mb-2">Ai Analyse</p>
                <h3 id="ai-response" class="text-3xl font-black uppercase text-white tracking-tight leading-none">...</h3>
                <p id="ai-details" class="text-sm opacity-70 mt-3 italic leading-relaxed text-gray-400"></p>
            </div>
        </section>

        <div>
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-4 px-1 italic">Logbog</h3>
            <div id="collection-list" class="space-y-3"></div>
        </div>
    </main>

    <button id="camera-btn" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] w-20 h-20 primary-gradient flex items-center justify-center shadow-[0_0_50px_rgba(0,229,255,0.4)] active:scale-90 transition-all border-8 border-[#0a0c0e]">
        <span class="material-symbols-outlined font-black text-4xl text-[#0a0c0e]">photo_camera</span>
    </button>

    <div id="scanner" class="hidden fixed inset-0 bg-black z-[1000] flex flex-col overflow-hidden">
        <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
        <div class="scanner-line"></div>
        <div class="absolute inset-0 p-8 flex flex-col justify-between pointer-events-none">
            <div class="flex justify-between items-start pointer-events-auto">
                <div class="glass-panel px-4 py-2 border-l-2 border-[#00e5ff]">
                    <p class="text-[10px] font-black uppercase text-[#00e5ff]">Scanner Active</p>
                </div>
                <button id="close-btn" class="text-white text-5xl">✕</button>
            </div>
            <div class="flex justify-center mb-10 pointer-events-auto">
                <button id="capture-btn" class="w-24 h-24 border-8 border-white rounded-full bg-white/20 backdrop-blur-xl active:scale-95 transition-all shadow-2xl"></button>
            </div>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
    </div>

<script>
    const API_KEY = "AIzaSyDs0lCbNiSRRIBv2T06vNQTGgJUpCfsHCI";
    
    const cameraBtn = document.getElementById('camera-btn');
    const scanner = document.getElementById('scanner');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const closeBtn = document.getElementById('close-btn');
    const resultBox = document.getElementById('result-box');
    const aiResponse = document.getElementById('ai-response');
    const aiDetails = document.getElementById('ai-details');
    const xpDisplay = document.getElementById('xp-display');
    const countDisplay = document.getElementById('count-display');
    const xpBar = document.getElementById('xp-bar');
    const collectionList = document.getElementById('collection-list');

    let xp = parseInt(localStorage.getItem('scoutXP')) || 0;

    function updateUI() {
        const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
        xpDisplay.innerText = xp + " XP";
        countDisplay.innerText = finds.length;
        xpBar.style.width = Math.min((xp % 1000) / 10, 100) + "%";
        
        if (finds.length > 0) {
            collectionList.innerHTML = "";
            finds.slice().reverse().forEach(f => {
                const item = document.createElement('div');
                item.className = "glass-panel p-4 flex justify-between items-center border-l-2 border-[#00e5ff] mb-3";
                item.innerHTML = `<div><p class="text-[9px] font-bold text-[#00e5ff] uppercase tracking-widest">${f.date}</p><p class="text-lg font-black uppercase text-white leading-none mt-1">${f.name}</p></div><span class="material-symbols-outlined text-[#00e5ff]">verified</span>`;
                collectionList.appendChild(item);
            });
        }
    }
    updateUI();

    cameraBtn.onclick = async () => {
        scanner.classList.remove('hidden');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (e) {
            alert("Tillad kamera i browseren!");
            scanner.classList.add('hidden');
        }
    };

    closeBtn.onclick = () => {
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        scanner.classList.add('hidden');
    };

    captureBtn.onclick = async () => {
        captureBtn.disabled = true;
        canvas.width = 720;
        canvas.height = video.videoHeight * (720 / video.videoWidth);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL("image/jpeg", 0.5).split(',')[1];
        
        closeBtn.click();
        resultBox.classList.remove('hidden');
        aiResponse.innerText = "ANALYSERER...";
        aiDetails.innerText = "Forbinder til AI Core...";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: "Identify species. FORMAT: NAME (ALL CAPS) \n 1 sentence Danish info." },
                            { inline_data: { mime_type: "image/jpeg", data: base64 } }
                        ]
                    }],
                    // DEAKTIVER SIKKERHEDSFILTRE FOR AT UNDGÅ UNØDIGE BLOKERINGER
                    safetySettings: [
                        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                    ]
                })
            });

            const data = await res.json();
            
            if (data.error) {
                aiResponse.innerText = "API FEJL " + (data.error.code || "");
                aiDetails.innerText = data.error.message;
                return;
            }

            const rawText = data?.candidates?.[0]?.content?.parts?.[0]?.text || "UKENDT";
            const lines = rawText.split("\n").filter(l => l.trim());
            const name = (lines[0] || "UKENDT").replace(/[*#]/g, '').trim().toUpperCase();
            
            aiResponse.innerText = name;
            aiDetails.innerText = (lines[1] || "Art bekræftet.").replace(/[*#]/g, '').trim();

            if (name !== "FEJL" && name.length > 2) {
                xp += 100;
                localStorage.setItem("scoutXP", xp);
                const finds = JSON.parse(localStorage.getItem("scoutFinds")) || [];
                finds.push({ name, date: new Date().toLocaleDateString('da-DK') });
                localStorage.setItem("scoutFinds", JSON.stringify(finds));
                updateUI();
            }

        } catch (e) {
            aiResponse.innerText = "FORBINDELSE FEJL";
            aiDetails.innerText = "Tjek internettet.";
        } finally {
            captureBtn.disabled = false;
        }
    };
</script>

</body>
</html>
