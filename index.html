<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | AI Field Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0c0e; color: #e1e2e8; margin: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(25, 28, 32, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .primary-gradient { background: linear-gradient(135deg, #9cf0ff 0%, #00e5ff 100%); }
        .scanner-line { height: 2px; background: #00e5ff; position: absolute; width: 100%; animation: scan 2s linear infinite; box-shadow: 0 0 20px #00e5ff; z-index: 100; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* FIX: replaced invalid animate-in/fade-in with a real keyframe animation */
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .entry-animate { animation: fadeSlideIn 0.35s ease both; }
    </style>
</head>
<body class="pb-48">

    <header class="fixed top-0 w-full z-[50] bg-[#0a0c0e] border-b border-white/5 px-6 h-16 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-[#00e5ff]">menu_open</span>
            <h1 class="font-black uppercase tracking-widest text-lg text-white leading-none">NATURETRAILS</h1>
        </div>
        <div class="px-3 py-1 border border-white/10 text-[10px] font-black text-gray-400 uppercase">Lv. 01 Scout</div>
    </header>

    <main class="pt-24 px-4 max-w-lg mx-auto space-y-6">
        
        <section class="glass-panel p-6">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-[10px] font-bold text-[#00e5ff] uppercase tracking-widest mb-1 italic">Experience</p>
                    <h2 id="xp-display" class="text-5xl font-black italic tracking-tighter text-white leading-none">0 XP</h2>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1 font-black">FOUND</p>
                    <h2 id="count-display" class="text-xl font-black text-white leading-none">0</h2>
                </div>
            </div>
            <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                <div id="xp-bar" class="h-full bg-[#00e5ff] transition-all duration-1000" style="width: 5%"></div>
            </div>
        </section>

        <section id="result-box" class="hidden">
            <div class="glass-panel p-6 border-l-4 border-[#00e5ff] bg-[#00e5ff]/5 relative overflow-hidden">
                <p class="text-[9px] font-black text-[#00e5ff] uppercase tracking-[0.2em] mb-2">Ai Analysis</p>
                <h3 id="ai-response" class="text-3xl font-black uppercase text-white tracking-tight leading-none italic">Scanning...</h3>
                <p id="ai-details" class="text-sm opacity-70 mt-3 italic leading-relaxed text-gray-400"></p>
            </div>
        </section>

        <div>
            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-4 px-1 italic font-bold">Field Logbook</h3>
            <div id="collection-list" class="space-y-3"></div>
        </div>
    </main>

    <nav class="fixed bottom-0 w-full h-20 bg-[#0a0c0e] border-t border-white/5 flex justify-around items-center px-10 z-[80]">
        <div class="text-[#00e5ff] flex flex-col items-center">
            <span class="material-symbols-outlined text-2xl">explore</span>
            <span class="text-[9px] font-black uppercase mt-1">Explore</span>
        </div>
        <div class="text-white/20 flex flex-col items-center">
            <span class="material-symbols-outlined text-2xl">map</span>
            <span class="text-[9px] font-black uppercase mt-1">Map</span>
        </div>
    </nav>

    <button id="camera-btn" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] w-20 h-20 primary-gradient flex items-center justify-center shadow-[0_0_50px_rgba(0,229,255,0.4)] active:scale-90 transition-all border-8 border-[#0a0c0e]">
        <span class="material-symbols-outlined font-black text-4xl text-[#0a0c0e]">photo_camera</span>
    </button>

    <div id="scanner" class="hidden fixed inset-0 bg-black z-[1000] flex flex-col overflow-hidden">
        <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
        <div class="scanner-line"></div>
        <div class="absolute inset-0 p-8 flex flex-col justify-between pointer-events-none">
            <div class="flex justify-between items-start pointer-events-auto">
                <div class="glass-panel px-4 py-2 border-l-2 border-[#00e5ff]">
                    <p class="text-[10px] font-black uppercase text-[#00e5ff]">Bio-Link active</p>
                </div>
                <button id="close-btn" class="text-white text-5xl font-light">✕</button>
            </div>
            <div class="flex justify-center mb-10 pointer-events-auto">
                <button id="capture-btn" class="w-24 h-24 border-8 border-white rounded-full bg-white/20 backdrop-blur-xl active:scale-95 transition-all shadow-2xl"></button>
            </div>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
    </div>

<script>
    // SECURED TACTICAL LINK
const API_KEY = "AIzaSyAywn7yFlPVhfBcLDyq34Iw7L3N-J3FdYo";
    
    const cameraBtn    = document.getElementById('camera-btn');
    const scanner      = document.getElementById('scanner');
    const video        = document.getElementById('video');
    const canvas       = document.getElementById('canvas');
    const captureBtn   = document.getElementById('capture-btn');
    const closeBtn     = document.getElementById('close-btn');
    const resultBox    = document.getElementById('result-box');
    const aiResponse   = document.getElementById('ai-response');
    const aiDetails    = document.getElementById('ai-details');
    const xpDisplay    = document.getElementById('xp-display');
    const countDisplay = document.getElementById('count-display');
    const xpBar        = document.getElementById('xp-bar');
    const collectionList = document.getElementById('collection-list');

    let xp = parseInt(localStorage.getItem('scoutXP')) || 0;

    // FIX: also handles empty-list state so stale DOM entries don't persist
    function updateUI() {
        const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
        xpDisplay.innerText  = xp + " XP";
        countDisplay.innerText = finds.length;
        xpBar.style.width = Math.min((xp % 1000) / 10, 100) + "%";
        
        collectionList.innerHTML = "";
        if (finds.length > 0) {
            finds.slice().reverse().forEach(f => {
                const item = document.createElement('div');
                // FIX: replaced invalid Tailwind animate-in/fade-in with real CSS class
                item.className = "glass-panel p-4 flex justify-between items-center border-l-2 border-[#00e5ff] mb-3 entry-animate";
                item.innerHTML = `
                    <div>
                        <p class="text-[9px] font-bold text-[#00e5ff] uppercase tracking-widest">${f.date}</p>
                        <p class="text-lg font-black uppercase text-white tracking-tighter leading-none mt-1">${f.name}</p>
                    </div>
                    <span class="material-symbols-outlined text-[#00e5ff]">verified</span>`;
                collectionList.appendChild(item);
            });
        }
    }
    updateUI();

    // FIX: helper to cleanly stop the camera stream
    function stopStream() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
            video.srcObject = null;
        }
    }

    cameraBtn.onclick = async () => {
        scanner.classList.remove('hidden');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (e) {
            alert("Camera access denied. Check your browser permissions.");
            scanner.classList.add('hidden');
        }
    };

    closeBtn.onclick = () => {
        stopStream();
        scanner.classList.add('hidden');
    };

    captureBtn.onclick = async () => {
        // FIX: guard against firing before the video has real dimensions
        if (!video.videoWidth || !video.videoHeight) {
            alert("Camera isn't ready yet — please wait a moment.");
            return;
        }

        captureBtn.disabled = true;

        // FIX: safe canvas sizing (no divide-by-zero risk)
        const scale = 720 / video.videoWidth;
        canvas.width  = 720;
        canvas.height = Math.round(video.videoHeight * scale);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL("image/jpeg", 0.6).split(',')[1];

        // Close scanner before showing result
        stopStream();
        scanner.classList.add('hidden');

        resultBox.classList.remove('hidden');
        aiResponse.innerText = "CONNECTING...";
        aiDetails.innerText  = "Transmitting image data to AI core...";

        try {
            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`,
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Identify the species in this image. Strict Format: Line 1: NAME (ALL CAPS). Line 2: One short descriptive sentence in English." },
                                { inline_data: { mime_type: "image/jpeg", data: base64 } }
                            ]
                        }]
                    })
                }
            );

            const data = await res.json();

            if (data.error) {
                aiResponse.innerText = "API ERROR " + data.error.code;
                aiDetails.innerText  = data.error.message;
                return;
            }

            const rawText = data?.candidates?.[0]?.content?.parts?.[0]?.text || "UNKNOWN";
            const lines   = rawText.split("\n").filter(l => l.trim());
            const name    = (lines[0] || "UNKNOWN").replace(/[*#]/g, '').trim().toUpperCase();
            const detail  = (lines.slice(1).join(" ") || "Species logged successfully.").replace(/[*#]/g, '').trim();

            aiResponse.innerText = name;
            aiDetails.innerText  = detail;

            if (name.length > 2 && name !== "UNKNOWN") {
                xp += 100;
                localStorage.setItem("scoutXP", xp);

                const finds = JSON.parse(localStorage.getItem("scoutFinds")) || [];

                // FIX: prevent duplicate entries for the same species on the same day
                const today = new Date().toLocaleDateString('en-US');
                const alreadyLogged = finds.some(f => f.name === name && f.date === today);
                if (!alreadyLogged) {
                    finds.push({ name, date: today });
                    localStorage.setItem("scoutFinds", JSON.stringify(finds));
                }

                updateUI();
            }

        } catch (e) {
            aiResponse.innerText = "NETWORK ERROR";
            aiDetails.innerText  = "Connection failed. Please try again.";
        } finally {
            // FIX: always re-enable button, even if an error is thrown before the return
            captureBtn.disabled = false;
        }
    };
</script>
</body>
</html>
