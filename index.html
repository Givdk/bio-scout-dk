<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Scout DK | AI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1A1D21; color: #F0F0F0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-blue { color: #00E5FF; }
        .bg-neon { background-color: #00E5FF; }
        .neon-glow { box-shadow: 0 0 25px rgba(0, 229, 255, 0.5); }
        @keyframes scan-line { 0% { top: 0%; } 100% { top: 100%; } }
        .scanner-line { height: 2px; background: #00E5FF; position: absolute; width: 100%; animation: scan-line 2s linear infinite; box-shadow: 0 0 15px #00E5FF; }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="flex justify-between items-center mb-8 pt-4">
        <div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase">Bio-Scout <span class="neon-blue">AI</span></h1>
            <p class="text-[10px] tracking-[0.3em] text-gray-500 uppercase font-bold text-center">Live Intelligence</p>
        </div>
        <div class="w-12 h-12 rounded-full border border-gray-700 flex items-center justify-center bg-gray-800 shadow-xl">👤</div>
    </header>

    <section class="mb-8">
        <div class="glass p-5 rounded-3xl border-l-4 border-[#00E5FF]">
            <p class="text-[10px] uppercase tracking-widest text-[#00E5FF] font-bold mb-1">Status</p>
            <p class="text-white font-medium" id="status-text">Klar til scanning i dansk natur...</p>
        </div>
    </section>

    <section id="result-box" class="hidden mb-8">
        <h2 class="text-[10px] uppercase tracking-[0.3em] text-gray-500 mb-4 font-black">AI Analyse Resultat</h2>
        <div class="glass p-6 rounded-3xl border border-[#00E5FF]/30 bg-[#00E5FF]/5">
            <p id="ai-response" class="text-lg font-bold text-white mb-2 font-['Inter']">Analyserer...</p>
            <p id="ai-details" class="text-sm text-gray-400 italic font-light"></p>
        </div>
    </section>
