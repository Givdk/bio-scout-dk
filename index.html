<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Scout | Stitch Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00E5FF;
            --dark: #0A0C10;
            --card: rgba(255, 255, 255, 0.04);
        }
        body { 
            background-color: var(--dark); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.02em;
        }
        /* Lovelable.dev inspireret glas-effekt */
        .bento-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            transition: all 0.3s ease;
        }
        /* Stitch AI Pulse */
        .ai-glow {
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.25);
            border: 2px solid var(--neon);
        }
        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="p-6 pb-40">

    <header class="flex justify-between items-center mb-10">
        <div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-[#00E5FF] animate-pulse"></div>
                <span class="text-[10px] uppercase tracking-[0.4em] text-gray-500 font-bold">Stitch AI Engine</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tighter mt-1">BIO-SCOUT</h1>
        </div>
        <div class="w-12 h-12 bento-card flex items-center justify-center text-xl border-white/20">🌿</div>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bento-card p-5 col-span-2 relative overflow-hidden" id="main-status">
            <p class="text-[10px] uppercase tracking-widest text-[#00E5FF] font-bold mb-1">Current Task</p>
            <h3 class="text-lg font-bold">Find Forårets Tegn</h3>
            <p class="text-xs text-gray-400 mt-1">Scan din første plante for at låse op for badges.</p>
        </div>
        
        <div class="bento-card p-5">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Scans</p>
            <p class="text-2xl font-black mt-1" id="scan-count">0</p>
        </div>
        <div class="bento-card p-5">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Rank</p>
            <p class="text-2xl font-black mt-1 text-[#00E5FF]">Novice</p>
        </div>
    </div>

    <section id="result-box" class="hidden mb-6 animate-in slide-in-from-bottom-4 duration-500">
        <div class="bento-card p-6 ai-glow bg-[#00E5FF]/5">
            <div class="flex justify-between items-start mb-4">
                <p id="ai-response" class="text-xl font-bold leading-tight">Analyserer...</p>
                <span class="bg-[#00E5FF] text-black text-[10px] font-black px-2 py-1 rounded-full uppercase">Match 98%</span>
            </div>
            <p id="ai-details" class="text-sm text-gray-400 leading-relaxed font-medium"></p>
        </div>
    </section>
