<!DOCTYPE html>
<html class="dark" lang="da">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "background": "#111417",
              "surface-high": "#272a2e",
              "primary-cyan": "#00e5ff",
              "on-surface": "#e1e2e8",
            },
            fontFamily: { "sans": ["Inter"] },
            borderRadius: { "none": "0px" },
          },
        },
      }
    </script>
    <style>
        body { background-color: #111417; letter-spacing: -0.01em; }
        h1,h2,h3,h4 { letter-spacing: -0.02em; text-transform: uppercase; font-style: italic; }
        * { border-radius: 0px !important; }
        .scanner-line { height: 2px; background: #00e5ff; position: absolute; width: 100%; animation: scan 2s linear infinite; box-shadow: 0 0 15px #00e5ff; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .mission-success { animation: pulseGlow 1.5s infinite; border: 2px solid #00e5ff !important; }
        @keyframes pulseGlow { 0%,100% { box-shadow: 0 0 5px #00e5ff; } 50% { box-shadow: 0 0 20px #00e5ff; } }
    </style>
</head>
<body class="text-on-surface min-h-screen pb-32">

    <header class="fixed top-0 w-full z-50 bg-[#111417]/90 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <button onclick="window.location.href='index.html'" class="flex items-center gap-1 text-primary-cyan">
            <span class="material-symbols-outlined text-sm">arrow_back</span>
            <span class="text-[9px] font-black uppercase">Hjem</span>
        </button>
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary-cyan text-xl">rebase_edit</span>
            <span class="font-black text-xs tracking-[0.2em] uppercase">Scanner</span>
        </div>
    </header>

    <main class="pt-24 px-6 max-w-md mx-auto space-y-8">
        <section class="bg-surface-high p-6 shadow-2xl">
            <p class="text-[10px] font-bold text-primary-cyan tracking-[0.2em] mb-1 uppercase">Bio-Points</p>
            <h2 id="xp-display" class="text-6xl font-black italic tracking-tighter leading-none">0</h2>
        </section>

        <section class="space-y-3">
            <p id="mission-label" class="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]">Aktiv Mission</p>
            <div id="mission-card" class="bg-surface-high p-5 relative overflow-hidden">
                <h4 id="mission-title" class="text-lg font-black leading-tight uppercase">Henter mission...</h4>
                <p id="mission-desc" class="text-xs text-on-surface/60 italic mt-1"></p>
            </div>
        </section>

        <section id="result-box" class="hidden">
            <div id="result-panel" class="bg-surface-high p-6 relative">
                <p class="text-[9px] font-black text-primary-cyan tracking-[0.2em] mb-2 uppercase italic">Analyse Færdig</p>
                <h3 id="ai-response" class="text-3xl font-black leading-none mb-3 uppercase"></h3>
                <p id="ai-details" class="text-sm italic opacity-70 leading-relaxed border-t border-white/10 pt-4"></p>
            </div>
        </section>
    </main>

    <button id="camera-btn" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-20 h-20 bg-primary-cyan flex items-center justify-center shadow-[0_0_40px_rgba(0,229,255,0.3)] active:scale-95 transition-transform z-50">
        <span class="material-symbols-outlined text-background text-4xl font-black">center_focus_strong</span>
    </button>

    <div id="scanner" class="hidden fixed inset-0 bg-background z-[100] flex flex-col">
        <video id="video" class="w-full h-full object-cover opacity-60" autoplay playsinline></video>
        <div class="scanner-line"></div>
        <div class="absolute inset-0 p-8 flex flex-col justify-between items-center pointer-events-none">
            <button id="close-btn" class="self-end text-white text-3xl font-light pointer-events-auto">✕</button>
            <button id="capture-btn" class="w-24 h-24 border-4 border-primary-cyan bg-primary-cyan/10 pointer-events-auto active:bg-primary-cyan/40 mb-12"></button>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
    </div>

<script>
    const API_KEY = "AIzaSyBtFSrIgzicXNKN-FYMUAzc3--zrkQmzNc";
    
    const MISSIONS = [
        { id: "NT-718", xp: 500, da: { title: "Anemone", desc: "Find og scan en Anemone.", target: "Anemone" }, en: { title: "Anemone", desc: "Find and scan an Anemone flower.", target: "Anemone" } },
        { id: "NT-719", xp: 500, da: { title: "Skovmærke", desc: "Find og scan en Skovmærke.", target: "Skovmærke" }, en: { title: "Woodruff", desc: "Find and scan a Sweet Woodruff.", target: "Sweet Woodruff" } }
    ];

    let currentLang = localStorage.getItem('scoutLang') || 'da';
    let xp = parseInt(localStorage.getItem('scoutXP')) || 0;

    function getCurrentMission() {
        const done = JSON.parse(localStorage.getItem('completedMissions')) || [];
        return MISSIONS.find(m => !done.includes(m.id)) || null;
    }

    function updateUI() {
        document.getElementById('xp-display').innerText = xp;
        const m = getCurrentMission();
        if (m) {
            document.getElementById('mission-title').innerText = m[currentLang].title;
            document.getElementById('mission-desc').innerText = m[currentLang].desc;
        } else {
            document.getElementById('mission-title').innerText = currentLang === 'da' ? "Alt fuldført!" : "All complete!";
            document.getElementById('mission-desc').innerText = "";
        }
    }

    const cameraBtn = document.getElementById('camera-btn');
    const scanner = document.getElementById('scanner');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const closeBtn = document.getElementById('close-btn');

    cameraBtn.onclick = async () => {
        scanner.classList.remove('hidden');
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
    };

    closeBtn.onclick = () => { 
        if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        scanner.classList.add('hidden'); 
    };

    captureBtn.onclick = async () => {
        if (!video.videoWidth) return;
        const mission = getCurrentMission();
        captureBtn.disabled = true;

        const scale = 720 / video.videoWidth;
        canvas.width = 720;
        canvas.height = Math.round(video.videoHeight * scale);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL("image/jpeg", 0.6).split(',')[1];
        
        closeBtn.onclick();
        document.getElementById('result-box').classList.remove('hidden');
        document.getElementById('ai-response').innerText = "Analyserer...";

        try {
            const prompt = `Identify the species. Does it match ${mission ? mission[currentLang].target : 'nature'}? Format: Name, Yes/No, Description. Language: ${currentLang}`;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-lite:generateContent?key=${API_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64 } }] }] })
            });
            const data = await res.json();
            const text = data.candidates[0].content.parts[0].text;
            const lines = text.split('\n');
            const name = lines[0].trim();
            const isMatch = text.toUpperCase().includes("YES") || text.toUpperCase().includes("JA");

            document.getElementById('ai-response').innerText = name;
            document.getElementById('ai-details').innerText = lines[2] || "";

            if (isMatch && mission) {
                const done = JSON.parse(localStorage.getItem('completedMissions')) || [];
                done.push(mission.id);
                localStorage.setItem('completedMissions', JSON.stringify(done));
                xp += mission.xp;
                document.getElementById('result-panel').classList.add('mission-success');
            } else {
                xp += 100;
            }

            const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
            finds.push({ name, date: new Date().toLocaleDateString() });
            localStorage.setItem('scoutFinds', JSON.stringify(finds));
            localStorage.setItem('scoutXP', xp);
            updateUI();
        } catch (e) { document.getElementById('ai-response').innerText = "Fejl"; }
        finally { captureBtn.disabled = false; }
    };

    updateUI();
</script>
</body>
</html>
