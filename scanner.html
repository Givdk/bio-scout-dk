<!DOCTYPE html>
<html class="dark" lang="da">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Bio-Scout | Multi-Lang HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "background": "#111417",
              "surface-low": "#0b0e12",
              "surface-high": "#272a2e",
              "primary-cyan": "#00e5ff",
              "on-surface": "#e1e2e8",
            },
            fontFamily: { "sans": ["Inter"] },
            borderRadius: { "none": "0px" },
          },
        },
      }
    </script>
    <style>
        body { background-color: #111417; letter-spacing: -0.01em; }
        h1, h2, h3, h4 { letter-spacing: -0.02em; text-transform: uppercase; font-style: italic; }
        @keyframes missionGlow { 0% { box-shadow: 0 0 5px #00e5ff; } 50% { box-shadow: 0 0 25px #00e5ff; } 100% { box-shadow: 0 0 5px #00e5ff; } }
        .mission-success { animation: missionGlow 1.5s infinite; border: 2px solid #00e5ff !important; }
        .scanner-line { height: 2px; background: #00e5ff; position: absolute; width: 100%; animation: scan 2s linear infinite; box-shadow: 0 0 15px #00e5ff; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        * { border-radius: 0px !important; }
        .lang-btn-active { background-color: #00e5ff; color: #111417; }
        @keyframes unlockPop { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .unlock-animate { animation: unlockPop 0.4s ease both; }
    </style>
</head>
<body class="text-on-surface min-h-screen pb-32">

    <header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md px-6 py-4 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary-cyan text-xl">rebase_edit</span>
            <span class="font-black text-xs tracking-[0.2em]">BIO-SCOUT // PRO</span>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex border border-white/10 text-[9px] font-black">
                <button id="btn-da" class="px-2 py-1 lang-btn-active">DA</button>
                <button id="btn-en" class="px-2 py-1 text-white/40 hover:text-primary-cyan">EN</button>
            </div>
            <div class="bg-primary-cyan/10 px-2 py-1">
                <span class="text-[9px] font-black text-primary-cyan uppercase">Rank #142</span>
            </div>
        </div>
    </header>

    <main class="pt-24 px-6 max-w-md mx-auto space-y-8">

        <section class="bg-surface-high p-6 shadow-2xl">
            <p id="label-points" class="text-[10px] font-bold text-primary-cyan tracking-[0.2em] mb-1 uppercase">Bio-Points</p>
            <h2 id="xp-display" class="text-6xl font-black italic tracking-tighter leading-none">0</h2>
            <div class="mt-4 h-1 bg-white/5 w-full">
                <div id="xp-bar" class="h-full bg-primary-cyan transition-all duration-700" style="width: 0%"></div>
            </div>
        </section>

        <section class="space-y-3">
            <div class="flex justify-between items-end px-1">
                <h3 id="label-objective" class="text-[10px] font-black text-gray-500 tracking-[0.3em] uppercase">Aktivt Mål</h3>
                <span id="mission-id-tag" class="text-[9px] font-bold text-primary-cyan"></span>
            </div>
            <div id="mission-card" class="bg-surface-high p-5 relative overflow-hidden">
                <div class="relative z-10">
                    <h4 id="mission-title" class="text-lg font-black leading-tight mb-1 uppercase"></h4>
                    <p id="mission-desc" class="text-xs text-on-surface/60 italic"></p>
                </div>
                <div class="absolute bottom-0 left-0 h-1 bg-primary-cyan/20 w-full">
                    <div id="mission-progress" class="h-full bg-primary-cyan transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </section>

        <section id="result-box" class="hidden">
            <div id="result-panel" class="bg-surface-high p-6 relative transition-all">
                <p id="label-analysis" class="text-[9px] font-black text-primary-cyan tracking-[0.2em] mb-2 uppercase italic">Data Link Established</p>
                <h3 id="ai-response" class="text-3xl font-black leading-none mb-3 uppercase"></h3>
                <p id="ai-details" class="text-sm italic opacity-70 leading-relaxed border-t border-white/10 pt-4"></p>
            </div>
        </section>

        <section class="space-y-3">
            <h3 id="label-logbook" class="text-[10px] font-black text-gray-500 tracking-[0.3em] px-1 uppercase">Feltlogbog</h3>
            <div id="collection-list" class="space-y-2"></div>
        </section>

    </main>

    <button id="camera-btn" class="fixed bottom-8 left-1/2 -translate-x-1/2 w-20 h-20 bg-primary-cyan flex items-center justify-center shadow-[0_0_40px_rgba(0,229,255,0.3)] active:scale-95 transition-transform z-50">
        <span class="material-symbols-outlined text-background text-4xl font-black">center_focus_strong</span>
    </button>

    <div id="scanner" class="hidden fixed inset-0 bg-background z-[100] flex flex-col">
        <video id="video" class="w-full h-full object-cover opacity-60" autoplay playsinline></video>
        <div class="scanner-line"></div>
        <div class="absolute inset-0 p-8 flex flex-col justify-between items-center pointer-events-none">
            <div class="w-full flex justify-between items-start pointer-events-auto">
                <div id="label-scanner" class="bg-surface-high px-3 py-1 font-black text-[10px] text-primary-cyan uppercase">System_Scan_Active</div>
                <button id="close-btn" class="text-white text-3xl font-light">✕</button>
            </div>
            <button id="capture-btn" class="w-24 h-24 border-4 border-primary-cyan bg-primary-cyan/10 pointer-events-auto active:bg-primary-cyan/40 mb-12"></button>
        </div>
        <canvas id="canvas" class="hidden"></canvas>
    </div>

<script>
    // ⚠️ Indsæt din API-nøgle her — push ALDRIG denne fil til et offentligt repo
    const API_KEY = "DIN_API_NØGLE_HER";

    // ─── MISSIONER ───────────────────────────────────────────────
    // Tilføj flere missioner her — de låses op automatisk én ad gangen
    const MISSIONS = [
        {
            id: "NT-718",
            xp: 500,
            da: { title: "Botanical Recovery", desc: "Find og scan en blomstrende Anemone.", target: "Anemone" },
            en: { title: "Botanical Recovery", desc: "Find and scan a blooming Anemone flower.", target: "Anemone" },
        },
        {
            id: "NT-719",
            xp: 500,
            da: { title: "Skovens Vogter", desc: "Find og scan en Skovmærke plante.", target: "Skovmærke" },
            en: { title: "Forest Guardian", desc: "Find and scan a Sweet Woodruff plant.", target: "Sweet Woodruff" },
        },
        {
            id: "NT-720",
            xp: 750,
            da: { title: "Fugleøje", desc: "Scan en mejse — blåmejse eller musvit.", target: "Mejse" },
            en: { title: "Bird's Eye", desc: "Scan a tit bird — blue tit or great tit.", target: "Tit" },
        },
        {
            id: "NT-721",
            xp: 750,
            da: { title: "Svampejagt", desc: "Find og scan en vild svamp i naturen.", target: "Svamp" },
            en: { title: "Fungal Hunt", desc: "Find and scan a wild mushroom in nature.", target: "Mushroom" },
        },
        {
            id: "NT-722",
            xp: 1000,
            da: { title: "Insektdetektiv", desc: "Scan en sommerfugl af enhver art.", target: "Sommerfugl" },
            en: { title: "Insect Detective", desc: "Scan a butterfly of any species.", target: "Butterfly" },
        },
    ];

    // ─── UI-TEKSTER ──────────────────────────────────────────────
    const UI = {
        da: {
            points: "Bio-Points", objective: "Aktivt Mål", logbook: "Feltlogbog",
            analysis: "Data Link Established", scanner: "System_Scan_Active",
            linking: "LINKER...", missionMet: "MISSION FULDFØRT",
            logbookEmpty: "Logbog tom.", allDone: "Alle missioner fuldført!",
            prompt: (target, id) =>
                `Identificer arten på billedet. Bestem om det er en ${target} (Mission ${id}). Svar KUN på DANSK.\nFormat:\nLinje 1: ARTSNAVNET (KUN STORE BOGSTAVER).\nLinje 2: JA eller NEJ.\nLinje 3: Én kort sætning om arten.\nLinje 4: KATEGORI (skriv præcis ét af disse ord: PLANTE FUGL SVAMP INSEKT DYR ANDEN)`
        },
        en: {
            points: "Bio-Points", objective: "Active Objective", logbook: "Field Logbook",
            analysis: "Data Link Established", scanner: "System_Scan_Active",
            linking: "LINKING...", missionMet: "MISSION COMPLETE",
            logbookEmpty: "Logbook empty.", allDone: "All missions complete!",
            prompt: (target, id) =>
                `Identify the species in the image. Determine if it is a ${target} (Mission ${id}). Answer ONLY in ENGLISH.\nFormat:\nLine 1: SPECIES NAME (ALL CAPS).\nLine 2: YES or NO.\nLine 3: One short sentence about the species.\nLine 4: CATEGORY (write exactly one of these words: PLANT BIRD FUNGUS INSECT ANIMAL OTHER)`
        }
    };

    // ─── STATE ───────────────────────────────────────────────────
    let currentLang = localStorage.getItem('scoutLang') || 'da';
    let xp = parseInt(localStorage.getItem('scoutXP')) || 0;

    function getCompletedMissions() {
        return JSON.parse(localStorage.getItem('completedMissions')) || [];
    }

    function getCurrentMission() {
        const done = getCompletedMissions();
        return MISSIONS.find(m => !done.includes(m.id)) || null;
    }

    // ─── DOM ─────────────────────────────────────────────────────
    const cameraBtn       = document.getElementById('camera-btn');
    const scanner         = document.getElementById('scanner');
    const video           = document.getElementById('video');
    const canvas          = document.getElementById('canvas');
    const captureBtn      = document.getElementById('capture-btn');
    const closeBtn        = document.getElementById('close-btn');
    const resultBox       = document.getElementById('result-box');
    const resultPanel     = document.getElementById('result-panel');
    const aiResponse      = document.getElementById('ai-response');
    const aiDetails       = document.getElementById('ai-details');
    const xpDisplay       = document.getElementById('xp-display');
    const xpBar           = document.getElementById('xp-bar');
    const missionProgress = document.getElementById('mission-progress');
    const collectionList  = document.getElementById('collection-list');

    // ─── UPDATE UI ───────────────────────────────────────────────
    function updateUI() {
        const ui = UI[currentLang];
        const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
        const mission = getCurrentMission();

        document.getElementById('label-points').innerText    = ui.points;
        document.getElementById('label-objective').innerText = ui.objective;
        document.getElementById('label-logbook').innerText   = ui.logbook;
        document.getElementById('label-analysis').innerText  = ui.analysis;
        document.getElementById('label-scanner').innerText   = ui.scanner;

        xpDisplay.innerText = xp;
        xpBar.style.width = Math.min((xp % 1000) / 10, 100) + "%";

        if (mission) {
            document.getElementById('mission-id-tag').innerText = mission.id;
            document.getElementById('mission-title').innerText  = mission[currentLang].title;
            document.getElementById('mission-desc').innerText   = mission[currentLang].desc;
            missionProgress.style.width = "20%";
        } else {
            document.getElementById('mission-id-tag').innerText = "—";
            document.getElementById('mission-title').innerText  = ui.allDone;
            document.getElementById('mission-desc').innerText   = "";
            missionProgress.style.width = "100%";
        }

        // Logbog — bruger innerText for at undgå XSS fra AI-svar
        collectionList.innerHTML = "";
        if (finds.length === 0) {
            const empty = document.createElement('p');
            empty.className = "text-[10px] text-gray-600 uppercase italic px-1";
            empty.innerText = ui.logbookEmpty;
            collectionList.appendChild(empty);
        } else {
            finds.slice().reverse().forEach(f => {
                const item = document.createElement('div');
                item.className = "bg-surface-high p-4 flex justify-between items-center";

                const left = document.createElement('div');
                const dateEl = document.createElement('p');
                dateEl.className = "text-[9px] font-bold text-primary-cyan";
                dateEl.innerText = f.displayDate || f.date;
                const nameEl = document.createElement('p');
                nameEl.className = "text-lg font-black uppercase text-white leading-none mt-1 italic";
                nameEl.innerText = f.name;
                left.appendChild(dateEl);
                left.appendChild(nameEl);

                const icon = document.createElement('span');
                icon.className = "material-symbols-outlined text-primary-cyan text-sm";
                icon.innerText = "verified";

                item.appendChild(left);
                item.appendChild(icon);
                collectionList.appendChild(item);
            });
        }
    }

    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('scoutLang', lang);
        document.getElementById('btn-da').className = lang === 'da'
            ? "px-2 py-1 lang-btn-active"
            : "px-2 py-1 text-white/40 hover:text-primary-cyan";
        document.getElementById('btn-en').className = lang === 'en'
            ? "px-2 py-1 lang-btn-active"
            : "px-2 py-1 text-white/40 hover:text-primary-cyan";
        updateUI();
    }

    function stopStream() {
        if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
            video.srcObject = null;
        }
    }

    // ─── KAMERA ──────────────────────────────────────────────────
    cameraBtn.onclick = async () => {
        scanner.classList.remove('hidden');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (e) {
            alert(currentLang === 'da'
                ? "Kameraadgang nægtet. Tjek dine browserindstillinger."
                : "Camera access denied. Check your browser settings.");
            scanner.classList.add('hidden');
        }
    };

    closeBtn.onclick = () => { stopStream(); scanner.classList.add('hidden'); };
    document.getElementById('btn-da').onclick = () => setLanguage('da');
    document.getElementById('btn-en').onclick = () => setLanguage('en');

    // ─── CAPTURE & AI ─────────────────────────────────────────────
    captureBtn.onclick = async () => {
        if (!video.videoWidth || !video.videoHeight) {
            alert(currentLang === 'da' ? "Kameraet er ikke klar endnu." : "Camera not ready yet.");
            return;
        }

        const mission = getCurrentMission();
        if (!mission) {
            stopStream();
            scanner.classList.add('hidden');
            return;
        }

        captureBtn.disabled = true;
        const scale = 720 / video.videoWidth;
        canvas.width  = 720;
        canvas.height = Math.round(video.videoHeight * scale);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
        const base64 = canvas.toDataURL("image/jpeg", 0.6).split(',')[1];

        stopStream();
        scanner.classList.add('hidden');
        resultBox.classList.remove('hidden');
        resultPanel.classList.remove('mission-success');
        resultPanel.classList.remove('unlock-animate');
        aiResponse.innerText = UI[currentLang].linking;
        aiDetails.innerText  = "...";

        try {
            const ui     = UI[currentLang];
            const target = mission[currentLang].target;

            const res = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`,
                {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: ui.prompt(target, mission.id) },
                                { inline_data: { mime_type: "image/jpeg", data: base64 } }
                            ]
                        }]
                    })
                }
            );

            const data = await res.json();

            if (data.error) {
                aiResponse.innerText = "API ERROR " + data.error.code;
                aiDetails.innerText  = data.error.message;
                return;
            }

            const text      = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
            const lines     = text.split("\n").filter(l => l.trim());
            const name      = (lines[0] || "UNKNOWN").replace(/[*#]/g, '').trim().toUpperCase();
            const matchLine = (lines[1] || "").toUpperCase();
            const isMatch   = matchLine.includes("YES") || matchLine.includes("JA");
            const detail    = (lines[2] || "").replace(/[*#]/g, '').trim();
            const rawCat    = (lines[3] || "").replace(/[*#]/g, '').trim().toUpperCase();
            // Normaliser kategori til dansk uanset sprog
            const catMap    = { PLANT:"PLANTE", BIRD:"FUGL", FUNGUS:"SVAMP", INSECT:"INSEKT", ANIMAL:"DYR", OTHER:"ANDEN",
                                PLANTE:"PLANTE", FUGL:"FUGL", SVAMP:"SVAMP", INSEKT:"INSEKT", DYR:"DYR", ANDEN:"ANDEN" };
            const category  = catMap[rawCat] || "ANDEN";
            const isValid   = name.length > 2 && name !== "UNKNOWN";

            if (isMatch) {
                aiResponse.innerText = UI[currentLang].missionMet;
                aiDetails.innerText  = `${name}: ${detail}`;
                resultPanel.classList.add('mission-success');

                const done = getCompletedMissions();
                if (!done.includes(mission.id)) {
                    done.push(mission.id);
                    localStorage.setItem('completedMissions', JSON.stringify(done));
                    if (isValid) xp += mission.xp;
                    localStorage.setItem('scoutXP', xp);
                }

                // Næste mission vises med animation efter 2 sekunder
                setTimeout(() => {
                    document.getElementById('mission-card').classList.add('unlock-animate');
                    updateUI();
                }, 2000);

            } else {
                aiResponse.innerText = name;
                aiDetails.innerText  = detail;
                if (isValid) {
                    xp += 100;
                    localStorage.setItem('scoutXP', xp);
                }
            }

            if (isValid) {
                const today = new Date().toISOString().slice(0, 10);
                const finds = JSON.parse(localStorage.getItem('scoutFinds')) || [];
                if (!finds.some(f => f.name === name && f.date === today)) {
                    const displayDate = new Date().toLocaleDateString(currentLang === 'da' ? 'da-DK' : 'en-US');
                    finds.push({ name, date: today, displayDate, category });
                    localStorage.setItem('scoutFinds', JSON.stringify(finds));
                }
                // Opdater streak
                updateStreak(today);
                // Tjek badges
                checkBadges(finds, category);
                updateUI();
            }

        } catch (e) {
            aiResponse.innerText = "LINK_LOST";
            aiDetails.innerText  = currentLang === 'da'
                ? "Forbindelsen fejlede. Prøv igen."
                : "Connection failed. Please try again.";
        } finally {
            captureBtn.disabled = false;
        }
    };


    // ─── STREAK ──────────────────────────────────────────────────
    function updateStreak(today) {
        const last   = localStorage.getItem('lastScanDate');
        let streak   = parseInt(localStorage.getItem('scanStreak')) || 0;
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yStr = yesterday.toISOString().slice(0, 10);

        if (last === today) {
            // Allerede scannet i dag — ingen ændring
        } else if (last === yStr) {
            streak += 1; // Fortsætter streak
        } else {
            streak = 1; // Ny streak
        }
        localStorage.setItem('scanStreak', streak);
        localStorage.setItem('lastScanDate', today);
    }

    // ─── BADGES ──────────────────────────────────────────────────
    const BADGE_DEFS = [
        { id: "first_scan",   da: "Første Fund",     en: "First Find",      icon: "stars",          check: (finds) => finds.length >= 1 },
        { id: "first_plant",  da: "Botaniker",        en: "Botanist",        icon: "local_florist",  check: (finds) => finds.some(f => f.category === "PLANTE") },
        { id: "first_bird",   da: "Fuglekigger",      en: "Bird Watcher",    icon: "raven",          check: (finds) => finds.some(f => f.category === "FUGL") },
        { id: "first_fungus", da: "Svampejæger",      en: "Fungi Hunter",    icon: "psychiatry",     check: (finds) => finds.some(f => f.category === "SVAMP") },
        { id: "first_insect", da: "Insektdetektiv",   en: "Insect Detective",icon: "bug_report",     check: (finds) => finds.some(f => f.category === "INSEKT") },
        { id: "five_finds",   da: "5 Fund",           en: "5 Finds",         icon: "workspace_premium", check: (finds) => finds.length >= 5 },
        { id: "ten_finds",    da: "10 Fund",          en: "10 Finds",        icon: "military_tech",  check: (finds) => finds.length >= 10 },
        { id: "streak_3",     da: "3 Dages Streak",   en: "3 Day Streak",    icon: "local_fire_department", check: () => (parseInt(localStorage.getItem("scanStreak")) || 0) >= 3 },
        { id: "streak_7",     da: "7 Dages Streak",   en: "7 Day Streak",    icon: "whatshot",       check: () => (parseInt(localStorage.getItem("scanStreak")) || 0) >= 7 },
        { id: "mission_done", da: "Mission Fuldført", en: "Mission Complete", icon: "verified_user", check: () => (JSON.parse(localStorage.getItem("completedMissions")) || []).length >= 1 },
    ];

    function checkBadges(finds, newCategory) {
        const earned = JSON.parse(localStorage.getItem('earnedBadges')) || [];
        let newlyEarned = [];
        BADGE_DEFS.forEach(b => {
            if (!earned.includes(b.id) && b.check(finds, newCategory)) {
                earned.push(b.id);
                newlyEarned.push(b);
            }
        });
        if (newlyEarned.length > 0) {
            localStorage.setItem('earnedBadges', JSON.stringify(earned));
            // Vis badge notifikation
            showBadgeToast(newlyEarned[0]);
        }
    }

    function showBadgeToast(badge) {
        const toast = document.createElement('div');
        toast.style.cssText = "position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:9999;background:#00e5ff;color:#111417;padding:10px 20px;font-weight:900;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;box-shadow:0 0 30px rgba(0,229,255,0.5);transition:opacity 0.5s ease;";
        toast.innerText = "🏅 " + (currentLang === 'da' ? badge.da : badge.en) + " — Ulåst!";
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = "0"; setTimeout(() => toast.remove(), 500); }, 3000);
    }

    setLanguage(currentLang);
</script>
</body>
</html>
